bind:
  host: 127.0.0.1        # loopback only through Batch 4; tailnet bind is wired at p5-2 (network-posture-spec)
  port: 7431             # build-time default; changing it is a config edit + restart

auth:
  senders_file: /etc/rbtv-ignite/senders.yaml   # named-sender registry (D15 shape: sender-id, kind, token-hash, enabled); 0600, outside the repo
  # ⚑ STARTUP GATE (p4-1, spawn-profiles-spec.md Design 4): the daemon REFUSES TO START when this
  # file is missing, empty, group/world-readable, malformed, or declares no senders. Deploying it is
  # an OWNER-EXECUTED install step — see config/senders.example.yaml for the seed + the procedure.
  # Override the path (e.g. for probes) with RBTV_IGNITE_SENDERS_FILE via the unit's EnvironmentFile;
  # never by writing an instance path here (D26(3)).
  # Internal gateway<->server-core auth is the internal-api contract (p1-3) — NOT configured here:
  # it is a per-boot secret minted by the composition root, never a configured value.

spawn:
  data_root: /var/lib/rbtv-ignite   # store, logs/, prompts/ live under here (task 3.2 binds the concrete path)
  carrier: systemd                  # required (D48): containment is non-negotiable. A worker runs under
                                    # systemd-run --user with its profile caps/sandbox, or it refuses to start.
  kill_grace_seconds: 10            # SIGTERM -> grace -> SIGKILL

default_workdir_root: /path/set-at-setup   # REQUIRED (D22): the workdir every spawn falls back to when the
                                           # caller supplies none. Owner-fixed at setup (e.g. the owner's
                                           # workspace root); the seed ships this PLACEHOLDER only -- never
                                           # a hardcoded instance path (D9 relocatability).

profiles:
  claude-sonnet-tools:
    exec:
      argv: ["claude", "-p", "--model", "sonnet",
             "--output-format", "stream-json", "--verbose",
             "--allowedTools", "Bash(git *),Write"]   # allowlist BAKED into the profile (R3b); comma-joined ONE arg (POC)
      prompt: stdin
    resume:
      argv: ["claude", "--resume", "{session_ref}", "-p", "--model", "sonnet",
             "--output-format", "stream-json", "--verbose",
             "--allowedTools", "Bash(git *),Write"]
      prompt: stdin
    session_ref: { source: stdout-json, field: session_id }
    workdir_root: .rbtv/sessions   # D58: per-execution launch dirs at .rbtv/sessions/<exec-id>/. Machine-agnostic (D26(3)): workspace-relative, resolved at runtime against the workspace root that roots .rbtv/ — NEVER an instance path.
    caps: { memory_max: "4G", cpu_quota: "150%", runtime_max: "6h", tasks_max: 512 }
    # D58(3): the worker's kernel RW set must be EXACTLY its session dir. D61 UPDATE: the FS-mount
    # sandbox props below (ProtectSystem/ReadWritePaths/PrivateTmp) are NO LONGER emitted to systemd
    # — under the --user manager they are a no-op AND their mount-namespace setup denies bwrap the
    # user namespace it needs. The kernel FS boundary is now a bubblewrap mount namespace nested in
    # the unit (server/spawn/bwrap.js); carrier.js emits ONLY the bwrap-compatible keys to systemd
    # (NoNewPrivileges + the cgroup caps). ReadWritePaths is RETAINED here as the declarative source
    # for the bwrap RW binds (spawn.js derives editablePaths from it). --allowedTools stays as an
    # advisory second belt. See D59/D60/D61.
    sandbox:
      ProtectSystem: strict
      ReadWritePaths: ["{workdir}"]
      PrivateTmp: true
      NoNewPrivileges: true

  codex-git-write:
    # ERRATUM (notes, top): codex POLICY-blocks .git writes under workspace-write regardless of
    # config -- a git-writing codex profile runs danger-full-access, so codex's own sandbox is OFF
    # and containment comes from the bubblewrap mount namespace (D61; the unit's sandbox FS props
    # below are stripped at emission and no longer provide it).
    exec:
      argv: ["codex", "exec", "--cd", "{workdir}",
             "--sandbox", "danger-full-access", "-c", "approval_policy=never", "--json"]
      prompt: stdin        # codex hangs without stdin EOF from a non-TTY; the server closes stdin after writing
    resume:
      # Sandbox policy MUST be re-pinned on every turn -- resume without these flags would fall
      # back to codex's default sandbox and re-hit the erratum's policy-blocked .git writes.
      # (POC verified the bare resume shape only; flag acceptance on `exec resume` re-verified at 2.2.)
      argv: ["codex", "exec", "resume", "{session_ref}",
             "--sandbox", "danger-full-access", "-c", "approval_policy=never", "--json"]
      prompt: stdin
    session_ref: { source: stdout-json-event, event: thread.started, field: thread_id }
    workdir_root: .rbtv/sessions   # D58: per-execution launch dirs at .rbtv/sessions/<exec-id>/. Machine-agnostic (D26(3)): workspace-relative, resolved at runtime against the workspace root that roots .rbtv/ — NEVER an instance path.
    caps: { memory_max: "4G", cpu_quota: "150%", runtime_max: "6h", tasks_max: 512 }
    sandbox:
      ProtectSystem: strict
      ReadWritePaths: ["{workdir}"]
      PrivateTmp: true
      NoNewPrivileges: true

  opencode-sakana:
    # DEC-2: OpenCode is the orchestration core's harness. It has NO sandbox of its own
    # (POC Finding 3: it touched the live vault unprompted) -- the profile confines it.
    exec:
      argv: ["opencode", "run", "-m", "sakana/fugu-ultra"]
      prompt: stdin        # carriage to re-verify at 2.2; fallback per this spec: argv-last, marked
    resume:
      argv: ["opencode", "run", "-c", "-m", "sakana/fugu-ultra"]   # -c = continue this cwd's session
      prompt: stdin
    session_ref: { source: cwd-implicit }    # opencode resumes per-cwd; the session's workdir IS the ref
    headed:
      tui: { argv: ["opencode"] }            # headed-CAPABLE seam; the pty path is Batch 6's design
    workdir_root: .rbtv/sessions   # D58: per-execution launch dirs at .rbtv/sessions/<exec-id>/. Machine-agnostic (D26(3)): workspace-relative, resolved at runtime against the workspace root that roots .rbtv/ — NEVER an instance path.
    caps: { memory_max: "4G", cpu_quota: "150%", runtime_max: "8h", tasks_max: 512 }
    sandbox:
      ProtectSystem: strict
      ReadWritePaths: ["{workdir}"]
      PrivateTmp: true
      NoNewPrivileges: true

  test-sleep:
    # INERT TEST PROFILE (D52) -- the ONLY non-production profile here. It exists so the
    # spawn/ticker path can be exercised end-to-end WITHOUT a paid, side-effecting LLM
    # worker on the box that holds the vault. NO LLM. NO network. No side effects outside
    # its own workdir. Named for the in-process probe fixture it mirrors
    # (server/ticker/probes/lib.js) so probe/live parity is obvious -- D23: reuse the term,
    # never mint an alias.
    #
    # DURATION (60s) is load-bearing, not arbitrary. A `sleep` writes no stdout and reports
    # no completion, so the ticker's Enforce phase is the ONLY thing that records its exit:
    # the crash sweep sees the unit go inactive and writes a synthetic `completion`
    # (status: failed, exit=0 -- D23's "crash-swept agent", D18(4) uniform exit path) plus
    # jobs_log.status=failed. But the crash sweep only scans running/launching rows, and
    # silence drives the stall ladder: warn at 12 ticks, halt at 24 (10s cadence). A row
    # marked `stalled` LEAVES the swept set, so its exit would never be recorded at all.
    # 60s exits at ~tick 7 -- swept well inside the 12-tick warn rung, while still leaving
    # a comfortable window to observe the worker alive across a terminal close (CON-1).
    exec:
      argv: ["sleep", "60"]
      prompt: stdin        # sleep ignores stdin; the server still writes the prompt and closes it (EOF guard)
    resume:
      argv: ["sleep", "60"]
      prompt: stdin
    session_ref: { source: cwd-implicit }   # sleep has no session concept; the workdir IS the ref
    workdir_root: .rbtv/sessions   # D58: per-execution launch dirs at .rbtv/sessions/<exec-id>/. Machine-agnostic (D26(3)): workspace-relative, resolved at runtime against the workspace root that roots .rbtv/ — NEVER an instance path.
    caps: { memory_max: "64M", cpu_quota: "10%", runtime_max: "5m", tasks_max: 16 }
    # Carries a sandbox despite the trivial argv. Every production profile now declares one
    # (D58(3): the worker's kernel RW set must be EXACTLY its session dir); sleep has no internal
    # confinement of its own, so "no side effects outside its own workdir" above would otherwise
    # rest on trusting the argv alone. D61 UPDATE: the FS-mount props are stripped at emission and
    # the kernel boundary is the bwrap mount namespace (see the claude-sonnet-tools note); ReadWrite-
    # Paths is retained as the declarative source of the bwrap RW binds.
    sandbox:
      ProtectSystem: strict
      ReadWritePaths: ["{workdir}"]
      PrivateTmp: true
      NoNewPrivileges: true
