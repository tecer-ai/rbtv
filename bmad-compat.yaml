# RBTV → BMAD Compatibility Manifest
# Consumed by: _config/bootstrap.py (pre-flight check), tasks/check-bmad-compat.xml
# NOT loaded during normal agent sessions — compatibility data only
#
# Maintained by: RBTV team
# Update this file when any new RBTV→BMAD reference is added.

bmad_target_version: "6.0.4"
bmad_min_version: "6.0.0"

# Output folder name is user-configurable in BMAD v6.0.4+.
# The installer reads the folder name from core/config.yaml and preserves it.
# Do NOT hardcode any output folder name in RBTV components — use {bmad_output}.

# ─────────────────────────────────────────────────────────────────────────────
# Touchpoints — every RBTV dependency on BMAD structure, paths, or format
# ─────────────────────────────────────────────────────────────────────────────

touchpoints:

  # Files the installer reads from or writes to in the BMAD project
  installer_writes:
    - path: "_bmad/core/config.yaml"
      type: "modify"
      description: "Rewrites output_folder field to {project-root}/{folder}/{project-name} (folder name read from existing value)"
      field_used: "output_folder"
      source: "_config/bootstrap.py::normalize_bmad_output_paths"

    - path: "_bmad/bmm/config.yaml"
      type: "modify"
      description: "Rewrites output_folder, planning_artifacts, and implementation_artifacts fields"
      fields_used: ["output_folder", "planning_artifacts", "implementation_artifacts"]
      source: "_config/bootstrap.py::normalize_bmad_output_paths"

    - path: "_bmad/rbtv/_config/config.yaml"
      type: "modify"
      description: "Updates bmad_output path variable to match BMAD's configured output folder"
      field_used: "paths.bmad_output"
      source: "_config/bootstrap.py::normalize_bmad_output_paths"

    - path: "_bmad/_config/bmad-help.csv"
      type: "modify"
      description: "Appends RBTV module entry row"
      format_assumption: "CSV with columns: module, phase, name, code, sequence, workflow-file, command, required, agent-name, agent-command, agent-display-name, agent-title, options, description, output-location, outputs"
      source: "_config/bootstrap.py::add_rbtv_to_help_catalog"

    - path: ".claude/"
      type: "copy"
      description: "Copies RBTV config files (commands, agents, skills, rules) from _config/claude/ into .claude/"
      source: "_config/bootstrap.py::copy_folder"

    - path: ".claude/.mcp.json"
      type: "merge"
      description: "Merges RBTV MCP server config into Claude Code's MCP configuration"
      source: "_config/bootstrap.py::merge_mcp_json"

    - path: ".cursor/mcp.json"
      type: "merge"
      description: "Merges RBTV MCP server config into Cursor's MCP configuration"
      source: "_config/bootstrap.py::merge_mcp_json"

    - path: ".cursor/commands/"
      type: "replicate"
      description: "Replicates managed commands from .claude/commands/ to .cursor/commands/"
      source: "_config/bootstrap.py::replicate_commands_to_cursor"

    - path: ".cursor/rules/"
      type: "replicate"
      description: "Replicates managed rules from .claude/rules/ to .cursor/rules/ (.md→.mdc conversion)"
      source: "_config/bootstrap.py::replicate_rules_to_cursor"

    - path: ".cursor/agents/"
      type: "replicate"
      description: "Replicates managed agents from .claude/agents/ to .cursor/agents/"
      source: "_config/bootstrap.py::replicate_agents_to_cursor"

    - path: ".cursor/skills/"
      type: "replicate"
      description: "Replicates managed skills from .claude/skills/ to .cursor/skills/"
      source: "_config/bootstrap.py::replicate_skills_to_cursor"

    - path: ".cursorignore"
      type: "append"
      description: "Appends RBTV-managed patterns ({output-folder}/archive/)"
      source: "_config/bootstrap.py::merge_cursorignore"

  # BMAD file paths directly referenced in RBTV agent files
  agent_references:
    - path: "_bmad/bmm/workflows/1-analysis/create-product-brief/workflow.md"
      source: "agents/ana.md"
      description: "Product Brief workflow — product submenu entry [B]"

    - path: "_bmad/bmm/workflows/2-plan-workflows/create-prd/workflow-create-prd.md"
      source: "agents/ana.md"
      description: "PRD workflow — product submenu entry [PRD]"

    - path: "_bmad/bmm/workflows/2-plan-workflows/create-ux-design/workflow.md"
      source: "agents/ana.md"
      description: "UX Design workflow — product submenu entry [UX]"

  # BMAD file paths referenced from RBTV workflow files
  task_references:
    - path: "_bmad/core/workflows/advanced-elicitation/workflow.xml"
      source: "workflows/doc-compound-learning/workflow.md"
      variable: "advancedElicitationTask"
      description: "Advanced elicitation party mode — invoked for step refinement"

  # BMAD structural assumptions RBTV makes (format, field names, directory existence)
  structure_assumptions:
    - item: "bmad-help.csv column schema"
      path: "_bmad/_config/bmad-help.csv"
      description: "CSV must contain: module, phase, name, code, sequence, workflow-file, command, required, agent-name, agent-command, agent-display-name, agent-title, options, description, output-location, outputs"

    - item: "_bmad/_config/manifest.yaml version field"
      path: "_bmad/_config/manifest.yaml"
      description: "YAML must contain installation.version field — used by installer pre-flight check"

    - item: "_bmad/core/config.yaml output_folder field"
      path: "_bmad/core/config.yaml"
      description: "YAML must contain output_folder field — read by installer to determine user-chosen folder name"

    - item: "_bmad/bmm/config.yaml output path fields"
      path: "_bmad/bmm/config.yaml"
      description: "YAML must contain output_folder, planning_artifacts, implementation_artifacts fields"

    - item: "_bmad/ root directory structure"
      path: "_bmad/"
      description: "Expects: _bmad/_config/, _bmad/core/, _bmad/bmm/ subdirectories"
