<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Documentation — Robotville</title>
  <meta name="description" content="Project documents deployed via the Robotville Mentor workflow.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #011B50;
      --purple: #412762;
      --warm-white: #ECEAE4;
      --cool-white: #E8E8E0;
      --white: #FFFFFF;
      --white-70: rgba(255, 255, 255, 0.7);
      --white-08: rgba(255, 255, 255, 0.08);
      --font-display: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      --fs-display: clamp(1.75rem, 4vw, 2.5rem);
      --fs-body-lg: 1.125rem;
      --fs-body: 1rem;
      --fs-ui: 0.875rem;
      --fs-caption: 0.75rem;
      --fw-medium: 500;
      --fw-semibold: 600;
      --fw-bold: 700;
      --lh-snug: 1.2;
      --lh-relaxed: 1.7;
      --content-padding: max(24px, 6vw);
      --radius-pill: 50px;
      --ease-smooth: cubic-bezier(0.32, 0.94, 0.6, 1);
      --transition-fast: 0.2s var(--ease-smooth);
    }

    html { font-size: 16px; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: var(--font-body);
      color: var(--navy);
      background: var(--warm-white);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--content-padding);
      height: 64px;
      background: rgba(1, 27, 80, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .nav-brand {
      font-size: var(--fs-ui);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      transition: opacity var(--transition-fast);
    }

    .nav-brand:hover { opacity: 0.8; }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: var(--fs-ui);
      font-weight: var(--fw-medium);
      color: var(--white-70);
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      color: var(--white);
    }

    /* Content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(64px + 80px) var(--content-padding) 80px;
      text-align: center;
    }

    .section-label {
      font-size: var(--fs-caption);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: var(--font-display);
      font-size: var(--fs-display);
      font-weight: var(--fw-bold);
      line-height: var(--lh-snug);
      margin-bottom: 1.5rem;
      max-width: 600px;
    }

    .body-text {
      font-size: var(--fs-body-lg);
      line-height: var(--lh-relaxed);
      color: rgba(1, 27, 80, 0.65);
      max-width: 520px;
      margin-bottom: 2rem;
    }

    .back-link {
      display: inline-block;
      font-size: var(--fs-ui);
      font-weight: var(--fw-medium);
      color: var(--purple);
      text-decoration: none;
      transition: opacity var(--transition-fast);
    }

    .back-link:hover { opacity: 0.7; }

    /* Footer */
    .footer {
      padding: 32px var(--content-padding);
      text-align: center;
      font-size: var(--fs-caption);
      color: rgba(1, 27, 80, 0.4);
    }

    @media (max-width: 48em) {
      .nav { height: 56px; }
      .nav-links { gap: 20px; }
      .content { padding-top: calc(56px + 48px); }
    }
  </style>
</head>
<body>

  <nav class="nav" role="navigation" aria-label="Main navigation">
    <a href="/" class="nav-brand">Robotville</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/docs/" aria-current="page">Docs</a></li>
      <li><a href="/app/">Apps</a></li>
    </ul>
  </nav>

  <main class="content">
    <p class="section-label">Documentation</p>
    <h1>Project Documentation</h1>
    <p class="body-text">
      Project documents appear here when deployed via the <code>deploy docs</code>
      command. No projects deployed yet.
    </p>
    <a href="/" class="back-link">&larr; Back to robotville.ai</a>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Robotville</p>
  </footer>

</body>
</html>
