# Gemini capability manifest — the routing card's data interface for the gemini package.
# Schema + field meanings + routing-card consumers: ../manifest-schema.md
# Sources: routing-matrix-reference.md §4 (variant ids + prices live-confirmed 2026-06-09, p6-1 pilot, D-exec-15);
#          Google Gemini API docs: https://ai.google.dev/gemini-api/docs
# This is an API chat worker (stateless HTTP call — no filesystem access, no tool execution loop).
# The four CLI-shaped fields (headless, tool_surface, confinement, swarm_support) are filled
# with the repurposed API-worker values per manifest-schema.md §2a.
# Gemini is the ONLY web-capable chat worker: tool_surface.native: [web] (search grounding).
# Grounding is SHIPPED and routable: run.py exposes --grounded (sets extra_params["grounding"]=True)
# and --extra-params; gemini.py reads extra_params["grounding"] and swaps responseMimeType:application/json
# for the google_search tool. First live-fired 2026-06-09 (p6-1 pilot). web_access/native:[web] gate the
# light-grounding web-research leaf, which routes to Gemini (routing §6, p5-3 runner pass-through + p5-4
# leaf routing both shipped). A grounded dispatch is mutually exclusive with JSON-envelope mode —
# it returns DONE_WITH_NOTES + raw-output.md, no return.json.
# The exact invocation shape is in ./manual.md (pointed to by invocation_pointer).

model: gemini-api
display: "gemini (API)"
evidence_status: validated   # live-confirmed 2026-06-09 (p6-1, D-exec-15): the Gemini worker path ran end-to-end on a real paid call. Per-id integration confirmed 2026-06-11: gemini-3.5-flash AND gemini-3.1-flash-lite each ran end-to-end through run.py (exit 0, envelope_valid, finish_reason stop) — removes the prior "ids confirmed but not each exercised" caveat. CAVEAT: model self-reported ids are unreliable (the smoke content mislabeled itself) — this attests the runner↔provider path per --model id, NOT which model answered; id↔price binding stands on D-exec-15. Evidence: 2-areas/rbtv/coding/done-gate-evidence/rbtv/2026-06-11-worker-tier-benchmark.md.

variants:
  - variant: 3.5-flash   # Gemini 3.5 Flash — best intelligence / mid-cost API worker

    # MODEL-ID NOTE: "3.5-flash" is the RBTV routing label, and the variant name IS the live Google Gemini
    # API model id (`gemini-3.5-flash`, id + price live-confirmed 2026-06-09, p6-1 pilot, D-exec-15), passed
    # to the runner via --model at dispatch time.

    # --- boundedness + sizing (routing §2, §8) ---
    reasoning_tier: top             # benchmark-corroborated (was routing-matrix estimate): Gemini 3.5 Flash 78% SWE-V (Google) ≈ Sonnet, frontier reasoning with Thinking Tokens (2026-06-11); judgment-dense tasks
    context_window: 1000000         # 1M tokens per Google Gemini Flash class; re-verify against provider docs before pilot
    max_output: 8192                # conservative estimate — re-verify against provider docs before pilot; routing-matrix §4 does not specify

    # --- budget + capability gates (routing §2, §6) ---
    cost_class: mid                 # $1.50/$9.00 per MTok input/output (routing-matrix §4) — mid-tier price; pays for frontier reasoning
    code_competence: none           # API chat worker — not a code executor; route code work to kimi/codex
    web_access: true                # search grounding available — the ONLY web-capable chat worker in the routing table

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # stateless HTTP API; multiple concurrent calls are safe under disjoint output folders
    resume_support: none            # stateless API — no session resumption; re-dispatch fresh after a halt

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    # Repurposed API-worker values per manifest-schema.md §2a (API chat worker canonical):
    headless:
      flags: ""                     # no invocation flags — the runner script (run.py) is always non-interactive
      auto_approves_tools: false    # no tool-approval surface on a stateless API call
      prompt_transport: arg         # prompt reaches the runner via --prompt-file argument

    # --- auth pre-flight (routing §1 → key-resolution test, not USER-EXECUTED-ONLY) ---
    auth:
      required: true
      method: api-key               # GEMINI_API_KEY env var; availability = key resolves (not interactive login)
      interactive: false            # key resolution is automated; no human gesture required

    rate_budget_notes: "stateless HTTP; no retry exit-code convention (runner handles HTTP 429/5xx retry); Batch API available at 50% discount (routing-matrix §4) — not supported by run.py in this version; re-verify rate limits against provider docs before pilot"

    # --- tool surface + confinement (routing §2, §4, §8) ---
    # Repurposed API-worker values per manifest-schema.md §2a — with Gemini web exception:
    # native: [web] because search grounding is available; this is what gates the web-research leaf for API workers.
    tool_surface:
      native: [web]                 # search grounding (Google Search) — the ONLY API worker with web access
      mcp: false                    # no MCP server injection
      agent_file: false             # no per-dispatch agent/guidance spec
    confinement:
      workspace_scope: "output-folder only — no filesystem access"   # worker cannot read/write workspace; runner writes only into --output-folder
      tool_restriction: "none — worker cannot execute tools"
      write_enforcement: "runner writes only into --output-folder; path-sanitized against ../ and absolute paths"

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md   # rendered dispatch manual for the exact command shape
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant (pinnable into task frontmatter; never re-derived) — resolves to models/gemini-api/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/gemini-api/delta.md
    specialty: "web research via search grounding — the ONLY web-capable API chat worker (light single-call grounded lookup, NOT rigorous multi-source); frontier reasoning with Thinking Tokens; grounding shipped and routable via --grounded (routing §6 light-grounding leaf)"   # within-tier tiebreaker only; boundedness-first stays the master cut
    failure_modes:
      - "variant names are the live Gemini API ids (gemini-3.5-flash / gemini-3.1-flash-lite), id + price-confirmed 2026-06-09 (D-exec-15); re-verify only after a provider model refresh"
      - "grounded dispatch (--grounded) is mutually exclusive with JSON-envelope mode: gemini.py swaps responseMimeType:application/json for the google_search tool, so a grounded call returns DONE_WITH_NOTES + raw-output.md and NO return.json — the conductor must expect the raw-dump return surface, not the standard five-field envelope"
      - "no session resumption — a halted dispatch must be re-dispatched fresh; no partial-resume path"
      - "API key absent in env + env_file → package unavailable for the dispatch; router degrades, does not halt the run"
      - "max_output is a conservative probe-pending estimate — re-verify against provider docs before sizing batches"
      - "Batch API (50% discount) not supported by run.py in this version — must dispatch via standard API"

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
    # Repurposed API-worker values per manifest-schema.md §2a:
    swarm_support:
      subagents: false              # API worker cannot spawn sub-workers
      nesting: none
      default: disabled

  - variant: 3.1-flash-lite   # Gemini 3.1 Flash-Lite — cheapest / volume-processing API worker

    # MODEL-ID NOTE: same as 3.5-flash above — "3.1-flash-lite" is the RBTV routing label and IS the live
    # Gemini API model id (`gemini-3.1-flash-lite`, id + price live-confirmed 2026-06-09, p6-1 pilot, D-exec-15).

    # --- boundedness + sizing (routing §2, §8) ---
    reasoning_tier: mid             # confirmed mid (was routing-matrix estimate): Gemini 3.1 Flash-Lite GPQA Diamond 86.9 — above Haiku, below the Flash tier; cost-optimized with Thinking support; partially-bounded with doubt_policy: halt (2026-06-11)
    context_window: 1000000         # 1M tokens per Google Gemini Flash class; re-verify against provider docs before pilot
    max_output: 8192                # conservative estimate — re-verify against provider docs before pilot; routing-matrix §4 does not specify

    # --- budget + capability gates (routing §2, §6) ---
    cost_class: cheapest            # $0.25/$1.50 per MTok input/output (routing-matrix §4) — cheapest Gemini variant; the cost-floor pick
    code_competence: none           # API chat worker — not a code executor
    web_access: true                # search grounding available — same web capability as 3.5-flash

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # stateless HTTP API; concurrent calls safe under disjoint output folders
    resume_support: none            # stateless API — re-dispatch fresh after halt

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    # Repurposed API-worker values per manifest-schema.md §2a (API chat worker canonical):
    headless:
      flags: ""                     # runner always non-interactive
      auto_approves_tools: false    # no tool-approval surface
      prompt_transport: arg         # prompt via --prompt-file argument

    # --- auth pre-flight ---
    auth:
      required: true
      method: api-key               # same GEMINI_API_KEY; key-resolution test, not interactive login
      interactive: false

    rate_budget_notes: "same HTTP retry semantics as 3.5-flash; lower per-token cost — preferred for high-volume or cost-critical dispatches; Batch API at 50% discount available but not supported by run.py in this version; re-verify rate limits against provider docs before pilot"

    # --- tool surface + confinement ---
    # Repurposed API-worker values per manifest-schema.md §2a — with Gemini web exception:
    tool_surface:
      native: [web]                 # search grounding available (same as 3.5-flash)
      mcp: false
      agent_file: false
    confinement:
      workspace_scope: "output-folder only — no filesystem access"
      tool_restriction: "none — worker cannot execute tools"
      write_enforcement: "runner writes only into --output-folder; path-sanitized against ../ and absolute paths"

    # --- invocation + failures ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/gemini-api/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/gemini-api/delta.md
    specialty: "cheapest web-grounded / volume processing — the cost-floor grounded Gemini variant for high-volume or cost-critical grounded lookups; same search-grounding web capability as 3.5-flash, lower per-token cost"   # within-tier tiebreaker only
    failure_modes:
      - "variant names are the live Gemini API ids (gemini-3.5-flash / gemini-3.1-flash-lite), id + price-confirmed 2026-06-09 (D-exec-15); re-verify only after a provider model refresh"
      - "grounded dispatch (--grounded) is mutually exclusive with JSON-envelope mode: gemini.py swaps responseMimeType:application/json for the google_search tool, so a grounded call returns DONE_WITH_NOTES + raw-output.md and NO return.json — the conductor must expect the raw-dump return surface, not the standard five-field envelope"
      - "no session resumption — re-dispatch fresh after halt"
      - "API key absent → package unavailable; router degrades"
      - "max_output is a conservative probe-pending estimate — re-verify before sizing batches"
      - "Batch API (50% discount) not supported by run.py in this version"

    # --- swarm / sub-conducting ---
    # Repurposed API-worker values per manifest-schema.md §2a:
    swarm_support:
      subagents: false
      nesting: none
      default: disabled
