      env_var: SAKANA_API_KEY       # provisioned in this vault's env_file; opencode resolves it from the PROCESS env via the provider block's {env:SAKANA_API_KEY} — the dispatch must export it
      interactive: false

    rate_budget_notes: "exit-code taxonomy UNPILOTED; premium pricing ($5/$30 per 1M) — bound autonomous runs tightly; Sakana quota behavior unknown"

    # --- tool surface + confinement (same harness contract as z1) ---
    tool_surface:
      native: [shell, file, webfetch, todo]
      mcp: true
      agent_file: true
    confinement:
      workspace_scope: "worktree-mandatory — NO native sandbox (POC-observed ON THIS BACKEND); dispatch ONLY inside a dedicated git worktree via --dir <worktree>"
      tool_restriction: "opencode.json `permission` block + per-agent tool specs — UNPILOTED; never rely on them as the boundary"
      write_enforcement: git-diff-vs-allowlist

    # --- invocation + failures ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md
    delta_path: ./delta.md
    specialty: "model-diversity premium option — a non-US-lab frontier-claimed multi-agent (Composition-of-Experts) model behind the OSS harness; the POC's cleanest headless run (own todo list, self-verified). cost 7 — reached via pinned roles, never auto-picked"
    evidence_status: probe-pending  # live-proven twice (2026-07-06 POC worktree task, commit 6c0b1fb3; 2026-07-09 manual smoke: Shape-B dispatch exit 0, five-field return + confinement diff clean) — resume-in-loop, exit taxonomy, and a real gated task remain unpiloted
