# Codex capability manifest — the routing card's data interface for the codex-cli package.
# Schema + field meanings + routing-card consumers: ../manifest-schema.md
# Sources: live `codex --help` / `codex exec --help` / `codex --version` (Codex CLI 0.137.0,
#          verified on this machine 2026-06-07) + `~/.codex/config.toml` (model = gpt-5.5,
#          model_reasoning_effort = medium) + investor run B4D
#          (cp-rbtv-plan-orchestration-nested-subagent-isolation-validation.md, row B4D/p4-4:
#          the opt-in Codex backend ran as a SEPARATE OS PROCESS and gave LIVE context isolation).
# Evidence boundary: the full headless worker contract IS NOW VALIDATED — 2026-06-11, hypresent
# ui-bugfix run: codex 0.137.0 / gpt-5.5 default ran ~10 bounded-code dispatches end-to-end (exit 0,
# each conductor-reconciled vs disk, no out-of-allowlist writes; stdin-hang guard fixed in rbtv@1733b17).
# Evidence: studio/hypresent/docs/plan/ui-bugfix-2026-06-11/{run-log.md, evidence/fix-*-return.txt}
# (archived to the vault's build-history) +
# 2-areas/rbtv/coding/done-gate-evidence/rbtv/2026-06-11-worker-tier-benchmark.md.
# gpt-5.4 access: owner-confirmed 2026-06-11. The 2026-06-11 reasoning-test battery probed gpt-5.4
# LIVE (3 efforts × 6 questions, all exit 0, all efforts served). CLI contract shared-and-validated.
# Capability values (reasoning/coding/cost integers + evidence) transcribed from:
#   value-derivation.md (2026-06-16 ratified table, R2 final) — board source AA leaderboard.
#
# SCHEMA MIGRATION (2026-06-16, p2-m-cli): old band/tier fields replaced by integer 1–7 per manifest-schema.md §0/D11.
# D6 COLLAPSE applied: 6 per-effort variants → 2 per-model variants (gpt-5.5, gpt-5.4).
# The effort ladder (low/medium/high) lives in reasoning_modes as the post-pin dial, NOT separate variant rows.
# codex-exec EFFECTIVE context_window ≈ 258K for both gpt-5.5 and gpt-5.4 (the runtime enforces ~258K, NOT the 400K/1M docs nominals — see the variant notes; openai/codex #9429/#19409). The per-user cap is applied at runtime from model-plans.yaml.
# The exact invocation shape (commands, flags, sandbox/approval grammar, resume) is in ./manual.md
# (rendered from ./delta.md by ../render-manuals.py) — this manifest points to it, never duplicates it.

model: codex-cli
display: "codex (CLI)"
evidence_status: validated   # full headless worker contract VALIDATED 2026-06-11 (hypresent ui-bugfix: ~10 bounded-code dispatches via codex 0.137.0 / gpt-5.5 default, all exit 0, disk-reconciled). Only `default` (effort medium) exercised — high/low efforts share the contract but are unexercised; exit/retry taxonomy + resume-in-loop still UNPILOTED. Evidence: 2-areas/rbtv/coding/done-gate-evidence/rbtv/2026-06-11-worker-tier-benchmark.md
permission_rules:            # installer-managed allowlist entries in the target's .claude/settings.local.json — added when this package is elected, removed when deselected; schema: ../manifest-schema.md
  - "Bash(codex:*)"
  - "PowerShell(codex:*)"

# configurable_model: codex-cli runs a configured GPT model (OPENAI_MODEL / -m flag); result attribution names the configured id.

variants:
  - variant: gpt-5.5   # configured model = gpt-5.5; all efforts (low/medium/high) are ONE model row per D6 collapse — effort is the post-pin dial in reasoning_modes

    # --- capability + cost scores + sizing (routing §2, §8) — scale: schema §0 (integer 1–7, comparable across all models) ---
    reasoning: 7                           # AA II 57-60 (frontier cluster; owner correction: GPT-5.5 → Opus-class, 7); GPQA 53-56; HLE 41-44
    coding: 7                              # Terminal-Bench Hard 58-61 (top agentic-coding cluster, ties Fable territory)
    cost: 7                                # board blended price $4.35/1M → bin 7 (priciest; ranks LAST on a cost tie, never auto-picked)
    axis_evidence:
      reasoning: { source: "aa-ii(57-60,model);gpqa(53-56)", confidence: high }
      coding:    { source: "aa-tbh(58-61,model)", confidence: high }
    cost_evidence: { source: "aa-blended($4.35)→bin7", confidence: high }
    context_window: 258000          # gpt-5.5 EFFECTIVE usable window in codex exec ≈ 258K (runtime cache 272K × 95% effective; a live session reports model_context_window: 258400). The 400K/1M figures are docs nominals the runtime does NOT enforce — over-declaring the window triggers Codex's "ran out of room" hard crash (auto-compaction fires too late). Verified 2026-06-17 (openai/codex #9429, #19409). Per-user cap still applied at runtime from model-plans.yaml.
    max_output: 128000              # gpt-5.5 family single-turn output ceiling (~128K); model/provider-determined, not exposed in local codex config

    # --- role eligibility (routing §2, §6) ---
    web_access: true                # `--search` enables the native Responses web_search tool — research-leaf capable when launched with --search
    # multimodal: [image]           # -i/--image attaches image(s) to the prompt — OMITTED until the image path is probe-validated

    # --- reasoning / effort modes (routing §2 post-pin effort=f(boundedness) — schema §0a) ---
    reasoning_modes:
      depths: [low, medium, high]   # gpt-5.5 low/medium/high model_reasoning_effort (post-pin dial; effort set AFTER the capability pin)
      invocation: "model_reasoning_effort {level}"
      carrier: "CLI config flag"

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # independent codex exec processes are separate OS processes (B4D isolation property) — runnable concurrently under disjoint allowlists
    resume_support: session-id      # `codex exec resume <SESSION_ID>` / `--last`; resume reliability inside a dispatch loop is UNPILOTED

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    headless:
      flags: "exec -c approval_policy=\"never\""   # `codex exec` runs non-interactively; `-c approval_policy="never"` is MANDATORY headless (any other policy stalls for human approval; codex 0.137.0 removed the `--ask-for-approval` flag from `exec`). Add `-c model_reasoning_effort="<level>"` post-pin per reasoning_modes
      auto_approves_tools: true     # with approval_policy never the model executes shell commands without per-call human approval (bounded by --sandbox); confinement is the sandbox + post-run diff, not an interactive gate
      prompt_transport: either      # prompt as CLI arg OR via stdin (use `-` as prompt, or pipe; piped stdin + prompt arg → stdin appended as <stdin> block); stdin default for large prompts / Windows ARG_MAX ~32 KB

    # --- auth pre-flight (routing §1 → halt-recovery USER-EXECUTED-ONLY) ---
    auth:
      required: true
      method: cli-login             # `codex login` (ChatGPT sign-in, interactive) OR `printenv OPENAI_API_KEY | codex login --with-api-key`; this machine: "Logged in using ChatGPT"
      interactive: true             # first-time ChatGPT browser login is interactive (USER-EXECUTED-ONLY); api-key path is non-interactive but still owner-provisioned

    rate_budget_notes: "priciest codex variant (cost 7, $4.35/1M blended) — frontier OpenAI model; ranks LAST on a cost tie (never auto-picked via cost-ascending selector). Non-zero exit retry semantics (rate-limit/throttle vs non-retryable) are UNPILOTED on this machine — on any non-zero exit reconcile disk + recover-or-surface, never blind-retry; --ignore-user-config for a spend-predictable clean run"

    # --- tool surface + confinement (routing §2, §4, §8) ---
    tool_surface:
      native: [shell, file, web]    # model-generated shell commands (sandboxed), file read/write within scope, web via --search; MCP servers configurable (codex mcp)
      mcp: true                     # `codex mcp` manages external MCP servers; codex can also run AS an MCP server (codex mcp-server)
      agent_file: false             # no per-dispatch agent-file tool-restriction spec like kimi's --agent-file; tool surface is governed by --sandbox + approval policy + workspace .rules (execpolicy), not an agent file
    confinement:
      workspace_scope: "-C/--cd (work-dir) + --add-dir for extra writable dirs"   # primary scoping; --skip-git-repo-check only when the work-dir is not a git repo
      tool_restriction: "--sandbox (read-only | workspace-write | danger-full-access) + --ask-for-approval; workspace .rules via execpolicy (--ignore-rules to skip)"
      write_enforcement: git-diff-vs-allowlist   # the sandbox is real but its reliability as the sole boundary for this orchestrator is UNPILOTED — back it with post-run git diff of every changed path vs the allowlist

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/codex-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/codex-cli/delta.md
    specialty: "separate-process sandboxed code execution — frontier GPT-5.5 code-specialized agent (cost 7; reached via pins not cost-ascending selector); native --search web for code-with-research; top coding score 7 of the roster"   # within-tier tiebreaker only; boundedness-first stays the master cut
    configurable_model:
      is_configurable: true          # the actual model the harness runs is set by config/env (OPENAI_MODEL / -m flag), not baked into the package
      note: "served model set by -m gpt-5.5 (or machine config default); each variant is one configured GPT model, effort is the post-pin reasoning_modes dial"
    failure_modes:
      - "headless stalls waiting for approval unless approval_policy=never is passed (any other value blocks a non-interactive run)"
      - "refuses to run outside a git repo — pass --skip-git-repo-check when the work-dir is not a repo"
      - "first-run per-project trust prompt (config [projects] trust_level) — USER-EXECUTED-ONLY pre-flight; pre-trust or run codex once interactively in the workspace, never clear it programmatically"
      - "interactive ChatGPT login (codex login) is USER-EXECUTED-ONLY — halt + ask the owner; api-key via stdin is the non-interactive alternative"
      - "sandbox reliability as the SOLE confinement is UNPILOTED — always back it with the post-run git diff vs allowlist"
      - "cd does not persist between shell calls — each shell command is an independent subprocess; set --cd, never rely on cd chaining in prompts"
      - "non-zero exit retry taxonomy is UNPILOTED (unlike kimi exit-75) — reconcile disk + recover-or-surface on any non-zero exit, never blind-retry"
      - "final-message drop on a dropped turn is UNPILOTED — prefer --output-last-message <file> for a durable return; reconcile from disk on any garbled/absent return"

    # --- guidance file (routing §4 pre-dispatch check) ---
    guidance_file:
      convention: AGENTS.md         # Codex natively loads the workspace AGENTS.md guidance file (the mirror machinery target)
      mirror_entry: codex-mirror     # resolves to: python orchestration/models/mirror/mirror.py --config orchestration/models/codex-cli/mirror-config.yaml --target <workspace>

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
    swarm_support:
      subagents: false              # codex exec runs as a single worker process; no validated native sub-worker fan-out — it is itself a separate-process leaf in the topology
      nesting: none                 # no nested codex-spawns-codex in the validated/known surface
      default: disabled             # safe default; codex is a leaf worker, not a sub-conductor

    os_quirks:
      windows: "config [windows] sandbox = elevated; PowerShell ~32 KB single-arg ceiling — pipe the prompt via stdin (trailing `-`) for any non-trivial prompt; check $LASTEXITCODE for non-zero (taxonomy UNPILOTED — reconcile disk, do not blind-retry); stdin handling on Windows is UNPILOTED, verify on first dispatch; **workspace-write SPAWNS subprocesses on Windows — git/node (incl. node -e)/pwsh/cmd/where.exe all run (TESTED 2026-06-14, two probes, [windows] sandbox=elevated); the boundary is codex's APPROVAL ROUTER, not a spawn-capability limit** — only python/python -c is approval-declined ('approval required by policy, AskForApproval=Never'), node 'spawn setup refresh' no longer reproduces, file edits work; SPLIT (codex edits only; conductor runs validation as an exit-probe) or route to kimi-code-cli ONLY for python/pytest-validated or live-call (real/network API) leaves, NOT every capability-run; danger-full-access does NOT change the python decline (approval router orthogonal to sandbox mode, TESTED 2026-06-13); live-call/network WORKS under workspace-write with -c sandbox_workspace_write.network_access=true (TESTED 2026-06-14: node fetch returned HTTP 200; without the flag the same fetch fails and git/HTTPS is egress-refused) via an AUTO-APPROVED client (node — python stays approval-declined); danger-full-access NOT required for a live call (codex-cli 0.137.0, Windows 11); **codex sandbox CANNOT reach WSL** — wsl.exe returns WSL_E_DISTRO_NOT_FOUND inside codex exec while the same command works outside (OBSERVED 2026-07-02, poc-1-build p1-1, codex-cli 0.137.0): never route a task whose EXECUTION or validation runs inside WSL to codex; split in-WSL validations to conductor exit-probes or route to a WSL-capable worker"

  - variant: gpt-5.4   # -m gpt-5.4; ONE model row per D6 collapse — effort (low/medium/high) is the post-pin dial in reasoning_modes
    # reasoning 6 via Hard-Prompts gap-fill (base 5.4 near-frontier, Elo 1490 ≈ GPT-5.5 1492; confidence low→medium per D9).
    # coding 6 via owner judgment (p1 re-review c3: "one below GPT-5.5's coding 7"; confidence low, iterable D5 — no board coding row for base 5.4).
    # cost 5 via AA blended-price formula on owner-supplied prices: (2.50+15.00)/8 = $2.19 → bin 5 (G4-COST RESOLVED).
    evidence_status: validated      # gpt-5.4 ran exit-0 at all three efforts in the 2026-06-11 reasoning-test battery (18 calls); full bounded-code validated through the shared codex CLI contract. Capability integers are owner-ratified (reasoning gap-filled from Hard-Prompts, coding owner-sourced — both iterable D5)

    # --- capability + cost scores + sizing ---
    reasoning: 6                           # base GPT-5.4 absent from AA board — reasoning gap-filled from arena Hard-Prompts (base 5.4 near-frontier Elo 1490 ≈ GPT-5.5 1492); confidence medium (D9)
    coding: 6                              # owner-sourced ("one below GPT-5.5's coding 7"; base 5.4 has NO board coding row — G4-R2); confidence low, iterable
    cost: 5                                # owner-supplied base prices: in $2.50/out $15.00/1M → AA blended formula (in+out)/8 = $2.19 → bin 5 ($2.00-2.99); G4-COST RESOLVED
    axis_evidence:
      reasoning: { source: "aa-ii(38-49,mini/nano-proxy);gpqa(44-50);arena-hp(1490,base,near-frontier)", confidence: medium }
      coding:    { source: "owner-sourced(GPT-5.5 minus 1; base 5.4 absent from board)", confidence: low }
    cost_evidence: { source: "owner-supplied base price in $2.50/out $15.00 → blended (in+out)/8 = $2.19 → bin5", confidence: high }
    context_window: 258000          # gpt-5.4 EFFECTIVE usable window in codex exec ≈ 258K (272K nominal × 95% effective — same as gpt-5.5; both converge on the codex-exec runtime window). The 1M docs figure is an experimental opt-in, NOT native. Verified 2026-06-17 (openai/codex #9429, #19409). >272K bills 2x input.
    max_output: 128000              # assumed same single-turn output ceiling pending confirmation

    # --- role eligibility ---
    web_access: true                # same `--search` native web tool as gpt-5.5

    # --- reasoning / effort modes ---
    reasoning_modes:
      depths: [low, medium, high]   # gpt-5.4 low/medium/high model_reasoning_effort (post-pin dial; same effort grammar as gpt-5.5 via codex CLI)
      invocation: "-m gpt-5.4 -c model_reasoning_effort {level}"
      carrier: "CLI config flag"

    # --- parallelism + resume ---
    parallel_safe: true
    resume_support: session-id

    # --- non-interactive run ---
    headless:
      flags: "exec -c approval_policy=\"never\" -m gpt-5.4"   # exec + mandatory no-approval + the gpt-5.4 model pin; add -c model_reasoning_effort="<level>" post-pin per reasoning_modes
      auto_approves_tools: true
      prompt_transport: either

    # --- auth pre-flight ---
    auth:
      required: true
      method: cli-login
      interactive: true

    rate_budget_notes: "cost 5 ($2.19/1M blended, owner-supplied prices; $2.00-2.99 bin); prior-gen frontier model — per-dispatch spend below gpt-5.5 (cost 7). Same UNPILOTED exit/retry semantics — reconcile disk on any non-zero exit, never blind-retry. Cost was a low-confidence mini-proxy prior to G4-COST resolution; now real owner-supplied data"

    # --- tool surface + confinement ---
    tool_surface:
      native: [shell, file, web]
      mcp: true
      agent_file: false
    confinement:
      workspace_scope: "-C/--cd (work-dir) + --add-dir"
      tool_restriction: "--sandbox + --ask-for-approval; workspace .rules via execpolicy"
      write_enforcement: git-diff-vs-allowlist

    # --- invocation + failures ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/codex-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/codex-cli/delta.md
    specialty: "prior-gen GPT-5.4 codex — separate-process sandboxed code execution at cost 5 (vs gpt-5.5 cost 7); model-diversity alternative for code tasks where the frontier spend is not warranted; reasoning/coding both 6 (owner-ratified)"   # within-tier tiebreaker only
    configurable_model:
      is_configurable: true          # served model is configured via -m gpt-5.4; result attribution names the configured id
      note: "served model set by -m gpt-5.4 override; effort is the post-pin reasoning_modes dial via -c model_reasoning_effort=<level>"
    failure_modes:
      - "headless stalls waiting for approval unless approval_policy=never is passed"
      - "refuses to run outside a git repo — pass --skip-git-repo-check when the work-dir is not a repo"
      - "sandbox reliability as the SOLE confinement is UNPILOTED — back it with the post-run git diff vs allowlist"
      - "non-zero exit retry taxonomy is UNPILOTED — reconcile disk + recover-or-surface, never blind-retry"
      - "gpt-5.4 reasoning/coding are owner-ratified (reasoning: Hard-Prompts gap-fill confidence medium; coding: owner-sourced confidence low) — both iterable D5; re-confirm against a graded run if the routing placement is consequential"
      - "context window NOT separately confirmed for base gpt-5.4 — re-confirm before routing large inlined context"

    # --- guidance file ---
    guidance_file:
      convention: AGENTS.md
      mirror_entry: codex-mirror

    # --- swarm / sub-conducting ---
    swarm_support:
      subagents: false
      nesting: none
      default: disabled

    os_quirks:
      windows: "config [windows] sandbox = elevated; pipe the prompt via stdin for non-trivial prompts; check $LASTEXITCODE (taxonomy UNPILOTED); stdin handling on Windows UNPILOTED; **workspace-write SPAWNS subprocesses on Windows — git/node (incl. node -e)/pwsh/cmd/where.exe all run (TESTED 2026-06-14, two probes, [windows] sandbox=elevated); the boundary is codex's APPROVAL ROUTER, not a spawn-capability limit** — only python/python -c is approval-declined ('approval required by policy, AskForApproval=Never'), node 'spawn setup refresh' no longer reproduces, file edits work; SPLIT (codex edits only; conductor runs validation as an exit-probe) or route to kimi-code-cli ONLY for python/pytest-validated or live-call (real/network API) leaves, NOT every capability-run; danger-full-access does NOT change the python decline (approval router orthogonal to sandbox mode, TESTED 2026-06-13); live-call/network WORKS under workspace-write with -c sandbox_workspace_write.network_access=true (TESTED 2026-06-14: node fetch returned HTTP 200; without the flag the same fetch fails and git/HTTPS is egress-refused) via an AUTO-APPROVED client (node — python stays approval-declined); danger-full-access NOT required for a live call (codex-cli 0.137.0, Windows 11)"
