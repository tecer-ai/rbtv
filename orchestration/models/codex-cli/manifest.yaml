# Codex capability manifest — the routing card's data interface for the codex package.
# Schema + field meanings + routing-card consumers: ../manifest-schema.md
# Sources: live `codex --help` / `codex exec --help` / `codex --version` (Codex CLI 0.137.0,
#          verified on this machine 2026-06-07) + `~/.codex/config.toml` (model = gpt-5.5,
#          model_reasoning_effort = medium) + investor run B4D
#          (cp-rbtv-plan-orchestration-nested-subagent-isolation-validation.md, row B4D/p4-4:
#          the opt-in Codex backend ran as a SEPARATE OS PROCESS and gave LIVE context isolation).
# Evidence boundary: the full headless worker contract IS NOW VALIDATED — 2026-06-11, hypresent
# ui-bugfix run: codex 0.137.0 / gpt-5.5 default ran ~10 bounded-code dispatches end-to-end (exit 0,
# each conductor-reconciled vs disk, no out-of-allowlist writes; stdin-hang guard fixed in rbtv@1733b17).
# Evidence: studio/hypresent/docs/plan/ui-bugfix-2026-06-11/{run-log.md, evidence/fix-*-return.txt} +
# 2-areas/rbtv/coding/done-gate-evidence/rbtv/2026-06-11-worker-tier-benchmark.md. Residual: only the
# `default` variant (gpt-5.5, effort medium) was exercised; the high-reasoning (effort=high) and
# low-reasoning (effort=low) variants share the CLI contract but were not separately run. Exit taxonomy
# + resume-in-loop remain UNPILOTED.
# gpt-5.4 access: owner-confirmed 2026-06-11. The 2026-06-11 reasoning-test battery
# (2-areas/rbtv/orchestration/reasoning-test-2026-06-11/) probed gpt-5.4 LIVE through this same codex
# 0.137.0 — `codex exec -m gpt-5.4 -c model_reasoning_effort=<low|medium|high>`, 18 calls (3 efforts × 6
# questions), exit 0, all three efforts served, correct output. That battery was CONDUCT-ONLY (no
# grading): it proves gpt-5.4 RUNS at every effort, NOT its judgment tier — so every gpt-5.4 variant
# carries `evidence_status: probe-pending` (CLI worker contract shared-and-validated; the gpt-5.4-specific
# reasoning_tier/cost mappings are effort-ladder inferences, UNGRADED). gpt-5.4's exact context window /
# pricing are NOT separately confirmed — re-confirm before routing large context or on a spend-sensitive run.
# The exact invocation shape (commands, flags, sandbox/approval grammar, resume) is in ./manual.md
# (rendered from ./delta.md by ../render-manuals.py) — this manifest points to it, never duplicates it.

model: codex-cli
display: "codex (CLI)"
evidence_status: validated   # full headless worker contract VALIDATED 2026-06-11 (hypresent ui-bugfix: ~10 bounded-code dispatches via codex 0.137.0 / gpt-5.5 default, all exit 0, disk-reconciled). Only `default` (effort medium) exercised — high-reasoning (effort=high) shares the contract but is unexercised; exit/retry taxonomy + resume-in-loop still UNPILOTED. Evidence: 2-areas/rbtv/coding/done-gate-evidence/rbtv/2026-06-11-worker-tier-benchmark.md
permission_rules:            # installer-managed allowlist entries in the target's .claude/settings.local.json (D17) — added when this package is elected, removed when deselected; schema: ../manifest-schema.md
  - "Bash(codex:*)"
  - "PowerShell(codex:*)"

variants:
  - variant: low-reasoning   # -c model_reasoning_effort="low" (configured gpt-5.5): the cheaper, lower-effort end of the bounded-code band
    evidence_status: probe-pending   # per-variant override: the CLI worker contract is validated, but effort=low was NOT separately exercised (only gpt-5.5/medium `default` ran the 2026-06-11 done-gate)

    # --- boundedness + sizing (routing §2, §8) ---
    reasoning_tier: mid             # low reasoning effort on the configured gpt-5.5 — still a reasoning model, dialed down for the cheaper end of partially-bounded code/analysis; doubt_policy: halt. The low<medium<high tier/cost ladder for effort is an inference, UNGRADED (probe-pending)
    context_window: 272000          # same configured gpt-5.5 family input budget (~272K); re-confirm against the configured model before routing large inlined context
    max_output: 128000              # same gpt-5.5 family single-turn output ceiling (~128K)

    # --- budget + capability gates (routing §2, §6) ---
    cost_class: low                 # low reasoning effort → fewer reasoning tokens → lower per-dispatch spend than the medium `default`; below `default` (mid) on the effort cost-ladder
    code_competence: strong         # same code-specialized executor as the other codex variants
    web_access: true                # same `--search` native web tool

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true
    resume_support: session-id

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    headless:
      flags: "exec -c approval_policy=\"never\" -c model_reasoning_effort=\"low\""   # exec + mandatory no-approval + the low-effort config override (exact 0.137.0 grammar — `-c approval_policy=\"never\"` — is in ./manual.md; this field is recall, the manual is authoritative)
      auto_approves_tools: true
      prompt_transport: either

    # --- auth pre-flight (routing §1 → halt-recovery USER-EXECUTED-ONLY) ---
    auth:
      required: true
      method: cli-login
      interactive: true

    rate_budget_notes: "low reasoning effort → lower latency + per-dispatch spend than default; same UNPILOTED exit/retry semantics — reconcile disk on any non-zero exit, never blind-retry"

    # --- tool surface + confinement (routing §2, §4, §8) ---
    tool_surface:
      native: [shell, file, web]
      mcp: true
      agent_file: false
    confinement:
      workspace_scope: "-C/--cd (work-dir) + --add-dir"
      tool_restriction: "--sandbox + --ask-for-approval; workspace .rules via execpolicy"
      write_enforcement: git-diff-vs-allowlist

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md
    delta_path: ./delta.md
    specialty: "cheapest-effort codex — the low-reasoning-effort configured-gpt-5.5 variant for the bounded end of separate-process sandboxed code execution, when full medium-effort spend is not warranted"   # within-tier tiebreaker only
    failure_modes:
      - "headless stalls waiting for approval unless --ask-for-approval never is passed"
      - "refuses to run outside a git repo — pass --skip-git-repo-check when the work-dir is not a repo"
      - "sandbox reliability as the SOLE confinement is UNPILOTED — back it with the post-run git diff vs allowlist"
      - "non-zero exit retry taxonomy is UNPILOTED — reconcile disk + recover-or-surface, never blind-retry"

    # --- guidance file (routing §4 pre-dispatch check) ---
    guidance_file:
      convention: AGENTS.md
      mirror_entry: codex-mirror

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
    swarm_support:
      subagents: false
      nesting: none
      default: disabled

    os_quirks:
      windows: "config [windows] sandbox = elevated; pipe the prompt via stdin for non-trivial prompts; check $LASTEXITCODE (taxonomy UNPILOTED); stdin handling on Windows UNPILOTED; **workspace-write CANNOT spawn a subprocess or make a live API call on Windows** (process exec denied 'AskForApproval=Never'; Node 'spawn setup refresh') though file edits work — a capability-run leaf (acceptance needs a build/test/script run) or live-call leaf (must hit a real API) must SPLIT (codex edits only; conductor runs the validation as an exit-probe) or route to kimi-code-cli; network_access=true does NOT lift it, and danger-full-access ALSO does NOT lift it (TESTED 2026-06-13: headless python --version still refused router-level, 'approval required by policy, AskForApproval=Never') (codex-cli 0.137.0, Windows 11)"

  - variant: default   # machine config: model = gpt-5.5, model_reasoning_effort = medium; the mid-tier partially-bounded profile

    # --- boundedness + sizing (routing §2, §8) ---
    reasoning_tier: mid             # partially-bounded code/analysis with doubt_policy: halt. code_competence corroborated by published benchmark (GPT-5.5: SWE-bench Pro 58.6, Terminal-Bench 2.0 82.7% SOTA) AND today's live run; reasoning_tier HELD at mid (SWE measures code, not judgment — judgment-dense effort=high mapping still UNPILOTED)
    context_window: 272000          # gpt-5.5 family input budget (~272K); NOT separately discoverable from local codex config — re-confirm against the configured model before routing large inlined context
    max_output: 128000              # gpt-5.5 family single-turn output ceiling (~128K); model/provider-determined, not exposed in local codex config

    # --- budget + capability gates (routing §2, §6) ---
    cost_class: mid                 # frontier OpenAI model via ChatGPT/API auth; mid-tier spend, above the cheap bounded-code workers
    code_competence: strong         # Codex is a code-specialized agent (codex exec edits the work-dir under sandbox); strong code executor
    web_access: true                # `--search` enables the native Responses web_search tool (no per-call approval) — research-leaf capable when launched with --search
    # multimodal: [image]           # -i/--image attaches image(s) to the prompt — OMITTED until the image path is probe-validated (no validated image dispatch in the corpus)

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # independent codex exec processes are separate OS processes (B4D isolation property) — runnable concurrently under disjoint allowlists; concurrent-wave behavior on this machine is UNPILOTED, verify on first parallel use
    resume_support: session-id      # `codex exec resume <SESSION_ID>` / `--last`; resume reliability inside a dispatch loop is UNPILOTED

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    headless:
      flags: "exec -c approval_policy=\"never\""   # `codex exec` (alias `codex e`) runs non-interactively; `-c approval_policy="never"` is MANDATORY headless (any other policy stalls for human approval; codex 0.137.0 removed the `--ask-for-approval` flag from `exec`)
      auto_approves_tools: true     # with --ask-for-approval never the model executes shell commands without per-call human approval (bounded by --sandbox); confinement is the sandbox + post-run diff, not an interactive gate
      prompt_transport: either      # prompt as CLI arg OR via stdin (use `-` as prompt, or pipe; piped stdin + prompt arg → stdin appended as <stdin> block); stdin default for large prompts / Windows ARG_MAX ~32 KB

    # --- auth pre-flight (routing §1 → halt-recovery USER-EXECUTED-ONLY) ---
    auth:
      required: true
      method: cli-login             # `codex login` (ChatGPT sign-in, interactive) OR `printenv OPENAI_API_KEY | codex login --with-api-key`; this machine: "Logged in using ChatGPT"
      interactive: true             # first-time ChatGPT browser login is interactive (USER-EXECUTED-ONLY); api-key path is non-interactive but still owner-provisioned

    rate_budget_notes: "frontier OpenAI model — mid-tier per-dispatch spend; non-zero exit retry semantics (rate-limit/throttle vs non-retryable) are UNPILOTED on this machine, unlike kimi's documented exit-75 — on any non-zero exit reconcile disk + recover-or-surface, never blind-retry; --ignore-user-config for a spend-predictable clean run"

    # --- tool surface + confinement (routing §2, §4, §8) ---
    tool_surface:
      native: [shell, file, web]    # model-generated shell commands (sandboxed), file read/write within scope, web via --search; MCP servers configurable (codex mcp)
      mcp: true                     # `codex mcp` manages external MCP servers; codex can also run AS an MCP server (codex mcp-server)
      agent_file: false             # no per-dispatch agent-file tool-restriction spec like kimi's --agent-file; tool surface is governed by --sandbox + approval policy + workspace .rules (execpolicy), not an agent file
    confinement:
      workspace_scope: "-C/--cd (work-dir) + --add-dir for extra writable dirs"   # primary scoping; --skip-git-repo-check only when the work-dir is not a git repo
      tool_restriction: "--sandbox (read-only | workspace-write | danger-full-access) + --ask-for-approval; workspace .rules via execpolicy (--ignore-rules to skip)"
      write_enforcement: git-diff-vs-allowlist   # the sandbox is real but its reliability as the sole boundary for this orchestrator is UNPILOTED — back it with post-run git diff of every changed path vs the allowlist; out-of-allowlist = halt + surface, never auto-revert

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md   # rendered dispatch manual (../render-manuals.py) — the exact command shape
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant (pinnable into task frontmatter; never re-derived) — resolves to models/codex-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/codex-cli/delta.md
    specialty: "separate-process sandboxed code execution — a code-specialized agent that edits the work-dir under an OS sandbox in its own process (live-proven context isolation); native --search web for code-with-research"   # within-tier tiebreaker only; boundedness-first stays the master cut
    failure_modes:
      - "headless stalls waiting for approval unless --ask-for-approval never is passed (any other value blocks a non-interactive run)"
      - "refuses to run outside a git repo — pass --skip-git-repo-check when the work-dir is not a repo"
      - "first-run per-project trust prompt (config [projects] trust_level) — USER-EXECUTED-ONLY pre-flight; pre-trust or run codex once interactively in the workspace, never clear it programmatically"
      - "interactive ChatGPT login (codex login) is USER-EXECUTED-ONLY — halt + ask the owner; api-key via stdin is the non-interactive alternative"
      - "sandbox reliability as the SOLE confinement is UNPILOTED — always back it with the post-run git diff vs allowlist"
      - "cd does not persist between shell calls — each shell command is an independent subprocess; set --cd, never rely on cd chaining in prompts"
      - "non-zero exit retry taxonomy is UNPILOTED (unlike kimi exit-75) — reconcile disk + recover-or-surface on any non-zero exit, never blind-retry"
      - "final-message drop on a dropped turn is UNPILOTED — prefer --output-last-message <file> for a durable return; reconcile from disk on any garbled/absent return"

    # --- guidance file (routing §4 pre-dispatch check) ---
    guidance_file:
      convention: AGENTS.md         # Codex natively loads the workspace AGENTS.md guidance file (the mirror machinery target)
      mirror_entry: codex-mirror     # resolves to: python orchestration/models/mirror/mirror.py --config orchestration/models/codex-cli/mirror-config.yaml --target <workspace>

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
