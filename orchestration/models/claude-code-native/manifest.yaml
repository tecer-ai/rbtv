    # a functional `available:` filter + selector drop is a captured follow-up.
    evidence_status: probe-pending   # the Agent-tool dispatch CONTRACT is the package's validated baseline (model-agnostic — holds for any Claude model via the Agent tool), but Fable 5 SPECIFICALLY has not been pilot-dispatched through this carrier and its sizing values (context_window, max_output) are docs-authored, not pilot-observed. Per manifest-schema.md §5 (unvalidated values carry probe-pending) the variant is probe-pending until a fable dispatch validates it; the opus/sonnet variants remain validated

    # --- boundedness + sizing (routing §2, §8) ---
    reasoning_tier: top             # fable shares opus's max-reasoning ceiling (top) — it serves the same unbounded / judgment-dense leaf as a peer of opus. The variant distinction is NOT the tier: it is cost_class (premium) + specialty (conductor / final-plan reviewer) + max_output, per manifest-schema.md §2 variant field-count discipline
    context_window: 1000000         # Fable 5 1M-context tier (claude-fable-5); the in-session sub-agent inherits the conductor's model class. Read the live model id to confirm — context is model/config-dependent, not a constant to assume
    max_output: 128000              # claude-fable-5 single-turn output ceiling (docs cap; model/provider-determined) — the live value is model-dependent, so size large single-turn output against it, never assume the constant. HIGHER than opus's 64000 (one of the routing-relevant fields distinguishing fable from opus)

    # --- budget + capability gates (routing §2, §6) ---
    cost_class: premium             # fable is premium-priced: ~2× opus ($10/$50 vs $5/$25 per MTok input/output). premium ranks ABOVE high, so cost-ascending selection NEVER auto-picks fable on a cost tie — it is reachable ONLY via the conductor / final-plan-reviewer pins (those pins land at p3-1, not here). Still the SAME Claude budget as the conductor (no cross-provider arbitrage); choosing an Agent-tool Claude sub-agent buys IN-SESSION orchestration, not a cheaper provider
    code_competence: strong         # an Agent-tool fable sub-agent carries the conductor's full tool surface (Read/Edit/Write/Bash/Grep/Glob) — a strong code executor and reviewer
    web_access: false               # NOT native via API — same as opus/sonnet: an Agent-tool sub-agent has NO native web tool. Web is reachable ONLY by naming the `rbtv-web-searching` skill in the dispatch prompt (the in-session web path, rbtv-sub-agents mandate). web_access reflects NATIVE capability per the schema, hence false
    # multimodal: [image]           # OMITTED — no image-input dispatch path is validated for the Agent-tool carrier (validated-evidence-only; add only after an image-path is exercised)

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # the conductor can fan out multiple Agent-tool sub-agents in one turn under DISJOINT file allowlists. Isolate parallel CODE workers by disjoint allowlist (no worktree flag exists for an in-session sub-agent — the allowlist IS the isolation)
    resume_support: none            # an Agent-tool sub-agent has NO session-resume handle. A DOUBT_ESCALATED / NEEDS_CONTEXT halt returns to the conductor, which RE-DISPATCHES a fresh sub-agent with the resolution inlined — there is no resume-the-same-session path

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    # Repurposed Agent-tool values per manifest-schema.md §2a (Agent-tool in-session workers block).
    # There is NO process and NO CLI: "headless" means the Agent tool call is in-session, non-interactive.
    headless:
      flags: ""                     # NO process flags — an Agent-tool dispatch is a tool call, not a command line. "in-session, non-interactive": the Agent/Task tool runs the sub-agent to completion and returns its final reply; there is no headless/print flag to pass
      auto_approves_tools: false    # an Agent-tool sub-agent runs under the CONDUCTOR's permissions — there is no separate per-dispatch tool-approval surface (and no auto-approve-all flag). Confinement is the conductor's job (allowlist), not a permission flag
      prompt_transport: arg         # the prompt reaches the sub-agent as the Agent tool's `prompt` PARAMETER (not stdin, not a file, not a -p arg). A large prompt is passed inline in that parameter

    # --- auth pre-flight (routing §1 → NO pre-flight: the conductor IS Claude) ---
    auth:
      required: false               # NO auth pre-flight — the conductor IS Claude; an in-session Agent-tool dispatch needs no login or API key
      method: none                  # the conductor's own session authorizes the sub-agent; there is no separate provisioning (contrast claude-code-cli's cli-login and the API workers' api-key)
      interactive: false            # never a human auth gesture — the dispatch is an in-session tool call

    rate_budget_notes: "premium Claude spend — ~2× opus ($10/$50 vs $5/$25 per MTok) — on the SAME Claude account/budget as the conductor; NOT a cheaper-provider arbitrage (contrast kimi/codex). An Agent-tool fable sub-agent draws on the conductor's own budget; there is no separate per-call billing surface or budget-cap flag (unlike claude-code-cli's --max-budget-usd). Wave pacing (routing §8) is the spend control — size parallel waves, not a per-call cap. premium cost_class makes the spend visible to the budget filter, but fable is reached via pins, not the cost-ascending selector"

