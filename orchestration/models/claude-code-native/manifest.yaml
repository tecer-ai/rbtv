      tool_restriction: "conductor's disjoint allowlist — passed in the prompt; no tool-family flags"
      write_enforcement: git-diff-vs-allowlist

    # --- invocation + failures ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md
    delta_path: ./delta.md
    specialty: "cheapest mechanical-batch Claude as an in-session sub-agent — approved only under a USER-APPROVED delegation map naming haiku (routing card §7 Haiku-clause); single-mode no-op effort"
    failure_modes:
      - "routing card §7 Haiku-clause: haiku is routable ONLY under a USER-APPROVED delegation map that names haiku for specific mechanical batches — absent such an approved map haiku is never routed (every pinned role floors at sonnet)"
      - "NO native CLAUDE.md / rules inheritance — the parent MUST inline every rule/skill directive the task needs; a rule-less sub-agent skips skills it was never told to invoke"
      - "NESTING WALL: cannot spawn its own sub-agents (depth cap ≤ 2)"
      - "NO web natively — requires `rbtv-web-searching` directive inlined in the prompt"
      - "NO session resume — re-dispatch fresh after a halt"
      - "single-mode no-op — Haiku has no effort dial; the effort step is a no-op for this variant"
      - "lossy final-turn return possible — reconcile against disk; bare relative write paths land in the wrong tree"

    # --- swarm / sub-conducting ---
