    coding: 2                             # Terminal-Bench Hard 27; limited agentic coder; SciCode cross-check 54 (the SciCode-vs-TBH gap is why TBH is the spine)
    cost: 3                               # AA Blended Price $0.77 → bin 3 (mid); board market price, no subscription discount (D11)
    axis_evidence:
      reasoning: { source: "aa-ii(37);gpqa(43);hle(10)", confidence: high }
      coding:    { source: "aa-tbh(27);scicode-xcheck(54)", confidence: high }
    cost_evidence: { source: "aa-blended($0.77)→bin3", confidence: high }
    context_window: 200000          # claude-haiku-4-5 context window; read the live model id to confirm
    max_output: 32000               # haiku single-turn output ceiling; model/config-dependent
    evidence_status: validated      # owner confirms Haiku tested + works (p1 re-review c7 / G6-R2 closed)

    # --- role eligibility (routing §2) ---
    web_access: false               # NO native web; web only via the `rbtv-web-searching` skill named in the dispatch prompt
    # routable_for: OMITTED — eligible for ALL leaves (the default; routing card §7 Haiku-clause gates actual use to approved delegation maps)

    # --- reasoning / effort modes (schema §0a) ---
    reasoning_modes:
      depths: []                    # Haiku is single-mode no-op — no effort dial; claude-haiku-4-5 = single-mode (per value-derivation.md and decisions.md)
      invocation: "none"            # no effort flag exists for Haiku
      carrier: "in-session — Haiku no-op single-mode"

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # stateless Agent-tool dispatch; multiple concurrent sub-agents safe under disjoint allowlists
    resume_support: none            # no session-resume handle; re-dispatch fresh after a halt

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    headless:
      flags: ""                     # no process flags — in-session Agent tool call
      auto_approves_tools: false    # runs under the conductor's permissions; no separate approval surface
      prompt_transport: arg         # prompt as the Agent tool's `prompt` parameter

    # --- auth pre-flight ---
