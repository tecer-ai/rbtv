      auto_approves_tools: true
      prompt_transport: either
    auth:
      required: true
      method: api-key               # --auth-type openai + DASHSCOPE_API_KEY (ModelStudio US)
      interactive: false            # availability = key resolves; key PRE-PROVISIONED in qwen's ~/.qwen/settings.json → resolves in ANY session (conductor/unattended dispatches authenticate directly; bound spend with budget/--max-wall-time)
    rate_budget_notes: "QWEN_CODE_UNATTENDED_RETRY=1 for 429/529; bound with --max-wall-time. No retryable-throttle exit code. (Same qwen CLI budget grammar as default.)"
