    # Differs from `default` on: max_output (384K vs 65536 — large-output code), and provider/specialty. Shares the qwen CLI contract.
    reasoning_tier: mid             # HELD at mid + doubt_policy: halt. ⚑ UNDER-RATED per published benchmark (DeepSeek V4-Flash 79.0% SWE-V ≈ Sonnet, AA index 1388) — judgment-pilot candidate, NOT bumped (code metric, not judgment). Re-sourced from spec → benchmark 2026-06-11
