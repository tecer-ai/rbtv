# Qwen capability manifest — the routing card's data interface for the qwen-code-cli package.
# Schema + field meanings + routing-card consumers: ../manifest-schema.md
# Source: 1-projects/rbtv-evolution/orchestration/qwen/qwen-cli-reference.md (the p3-8 findings report;
#         Qwen Code CLI 0.17.1 verified locally on Windows 11, 2026-06-07 — flags/subcommands/exit-codes
#         from the installed `qwen --help`). Multi-model backend mechanism + verified per-backend specs:
#         1-projects/rbtv-evolution/orchestration/qwen-multi-model/qwen-multi-model-research.md (2026-06-10).
# Evidence boundary: the CLI install + headless contract + flag-parsing are locally verified. The full
#         authenticated turn IS VALIDATED — 2026-06-10 (all four ModelStudio US backends reply-probed exit-0;
#         `deepseek-v4-flash` passed a full bounded-code done-gate; deepseek-v4-pro + glm-5.1 2026-06-10
#         follow-up pilots, conductor-reconciled on disk). Evidence:
#         1-projects/rbtv-evolution/coding/done-gate-evidence/rbtv/2026-06-10-qwen-multi-model.md.
# Capability values (reasoning/coding/cost integers + evidence) transcribed from:
#   value-derivation.md (2026-06-16 ratified table, R2 final) — board source AA leaderboard.
#
# SCHEMA MIGRATION (2026-06-16, p2-m-cli): old band/tier fields replaced by integer 1–7 per manifest-schema.md §0/D11.
# 4 backends unchanged in count. reasoning_modes UNKNOWN for ALL backends (G1 CLOSED as accepted CLI limitation —
# per-backend thinking depth is NOT exposed/controllable through the qwen-code CLI; do NOT invent depths).
# The exact invocation shape (commands, flags, approval grammar, exit codes, resume, per-backend `-m`) is
# in ./manual.md (rendered from ./delta.md by ../render-manuals.py) — this manifest points to it.

model: qwen-code-cli
display: "qwen-code (CLI)"
evidence_status: validated   # auth verified + all four ModelStudio US backends served; ALL FOUR carry full bounded-code proof — default (qwen3.6-plus) + deepseek-v4-flash 2026-06-10, deepseek-v4-pro + glm-5.1 2026-06-10 follow-up pilots (per-variant overrides below graduated probe-pending→validated).
permission_rules:            # installer-managed allowlist entries in the target's .claude/settings.local.json — added when this package is elected, removed when deselected; schema: ../manifest-schema.md
  - "Bash(qwen:*)"
  - "PowerShell(qwen:*)"

# --- Multi-model backends (ModelStudio US, OpenAI-compatible) ---
# The owner runs qwen against four configured backends via ~/.qwen/settings.json `modelProviders.openai`
# (all on https://dashscope-us.aliyuncs.com/compatible-mode/v1 under DASHSCOPE_API_KEY). Per-dispatch
# selection adds ONE flag to the canonical invocation: `--auth-type openai -m <id>` (omitting -m falls back
# to the configured model.name = qwen3.6-plus). Each backend below is a routable variant where at least one
# routing-relevant field differs (variant field-count discipline, manifest-schema §2).
# All four share the qwen CLI contract (exit codes, confinement, resume, tool surface) — only the routing fields differ.

variants:
  - variant: qwen3.6-plus   # native Apr-2026 flagship coder — the configured model.name (no -m needed); the home backend
    display: "Qwen3.6 Plus"   # installer backend-election label (per-variant; installer-consumed, NOT a routing input — schema §2)

    # --- capability + cost scores + sizing (routing §2, §8) — scale: schema §0 (integer 1–7, comparable across all models) ---
    reasoning: 5                           # AA II 50 ("Qwen3.6 Plus") — strong reasoner; GPQA 41; HLE 26
    coding: 4                              # Terminal-Bench Hard 44 — bounded agentic coder
    cost: 2                                # board blended price $0.43/1M → bin 2 (low)
    axis_evidence:
      reasoning: { source: "aa-ii(50);gpqa(41);hle(26)", confidence: high }
      coding:    { source: "aa-tbh(44)", confidence: high }
    cost_evidence: { source: "aa-blended($0.43)→bin2", confidence: high }
    context_window: 1048576         # 1M native (qwen3.6-plus); the configured ModelStudio backend
    max_output: 65536               # qwen3.6-plus single-turn cap (research §3); smaller than the DeepSeek backends (384K) — the routing distinction for large-output code tasks

    # --- role eligibility (routing §2, §6) ---
    web_access: false               # NO guaranteed native web-search tool — tool/MCP-dependent; provision via MCP if a research leaf needs web, else false
    # multimodal omitted — qwen3.6-plus image input is gateway-documented but CLI-path-unverified → omit until exercised

    # --- reasoning / effort modes (routing §2 post-pin effort=f(boundedness) — schema §0a) ---
    # G1 CLOSED — per-backend thinking depth is NOT exposed/controllable through the qwen-code CLI (p1 re-review c6; accepted limitation)
    reasoning_modes:
      depths: []                    # UNKNOWN — qwen-code CLI does not expose per-backend thinking depth control (G1 CLOSED as accepted CLI limitation; do NOT impute depths)
      invocation: "none"
      carrier: "CLI — per-backend thinking depth NOT controllable through qwen-code CLI (G1 CLOSED; accepted limitation)"

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # --worktree gives native per-session git-worktree isolation; concurrent instances under disjoint dirs supported
    resume_support: continue        # --continue / --resume <id> / --session-id / --fork-session; ALL require chat recording on (default)

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    headless:
      flags: "<positional-prompt> --output-format json --approval-mode yolo"   # positional prompt canonical on 0.17.1 (-p deprecated-but-functional); --output-format json for structured return; --approval-mode yolo auto-approves writes
      auto_approves_tools: true     # true under --yolo/--approval-mode yolo (probe-confirmed host-privilege warning, no sandbox); headless `auto` DENIES writes (live-proven p2-3) — use yolo for headless write work
      prompt_transport: either      # positional arg OR stdin pipe — a positional/-p prompt is appended to stdin content

    # --- auth pre-flight (routing §1) ---
    auth:
      required: true                # unauthenticated `qwen -p` exits 1 "No auth type is selected" — verified locally
      method: api-key               # --auth-type openai + DASHSCOPE_API_KEY (ModelStudio US); cli-login (qwen-oauth) free tier discontinued 2026-04-15
      interactive: false            # api-key path: availability = the key resolves (DASHSCOPE_API_KEY); key PRE-PROVISIONED in qwen's own ~/.qwen/settings.json `env` block → resolves in ANY session (conductor/unattended dispatches authenticate directly). SECURITY: any run can spend ModelStudio credit — bound with budget/--max-wall-time

    rate_budget_notes: "NO retryable-throttle exit code (unlike kimi 75) — set QWEN_CODE_UNATTENDED_RETRY=1 for in-process 429/529 backoff (cap 5 min, 30s stderr heartbeat); bound with --max-wall-time → exit 55. Budget overruns: --max-session-turns → exit 53; --max-wall-time/--max-tool-calls → exit 55. exit 1 = non-retryable (auth/config/usage) → halt + surface. Auth via --auth-type openai + DASHSCOPE_API_KEY (ModelStudio US)."

    # --- tool surface + confinement (routing §2, §4, §8) ---
    tool_surface:
      native: [shell, file, edit, agent]   # shell/file/edit + the `agent` tool (subagent dispatch); built-in PR-review; extensions add more
      mcp: true                     # qwen mcp add/list/reconnect, --mcp-config <json|file>, --allowed-mcp-server-names
      agent_file: true              # --system-prompt/--append-system-prompt per-run; tool restriction via --allowed-tools/--exclude-tools/--core-tools; guidance via QWEN.md/AGENTS.md
    confinement:
      workspace_scope: "CWD root + --include-directories/--add-dir (additive; NO single --work-dir flag); --worktree for isolation"
      tool_restriction: "--exclude-tools / --allowed-tools / --core-tools; --approval-mode graded gate; --sandbox container (backend-unverified on Windows)"
      write_enforcement: git-diff-vs-allowlist   # headless --yolo auto-approves all at host privilege, no sandbox — post-run git diff of every changed path vs the task allowlist is the reliable check

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/qwen-code-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/qwen-code-cli/delta.md
    specialty: "bounded code/agentic via the native Qwen3.6 flagship — purpose-built coding agent (shell/file/edit + built-in PR-review) with native --worktree isolation; the no-`-m` home backend; cost 2 (cheapest non-DeepSeek backend)"   # within-tier tiebreaker only; boundedness-first stays the master cut
    configurable_model:
      provider_label: "qwen-code (DashScope US)"   # installer backend-election provider-path label (installer-consumed; not a routing input)
      is_configurable: true          # the model the qwen CLI runs is CONFIGURATION, not a fixed package identity
      note: "served backend set by --auth-type openai + -m <id> (qwen3.6-plus | deepseek-v4-flash | deepseek-v4-pro | glm-5.1), all on ModelStudio US under DASHSCOPE_API_KEY; availability/attribution resolve the CONFIGURED id at dispatch (init.model echoes it), never assume from the package name"
    failure_modes:
      - "headless --yolo/--approval-mode yolo auto-approves ALL tool calls at host privilege — NO sandbox unless --sandbox (container backend unverified on Windows); enforce scope externally + post-run diff"
      - "headless --approval-mode auto DENIES every write/edit/shell call (read-only in practice) — use yolo/-y for headless write work (live-proven p2-3)"
      - "unauthenticated run exits 1 (No auth type is selected) — DASHSCOPE_API_KEY must resolve; it is PRE-PROVISIONED in qwen's own ~/.qwen/settings.json `env` block and resolves on EVERY qwen invocation by this user (proven C2 2026-06-10). SECURITY: any run can spend ModelStudio credit — bound with budget/--max-wall-time. If settings.json ever loses the key/auth, HALT and ask the owner to re-provision"
      - "NO retryable-throttle exit code — use QWEN_CODE_UNATTENDED_RETRY=1 for in-process 429/529 backoff; bound with --max-wall-time"
      - "budget overrun → exit 53 (--max-session-turns) or 55 (--max-wall-time/--max-tool-calls) — re-scope or raise caps, NOT a transient retry"
      - "--approval-mode default STALLS a headless run waiting for approval — always set auto/auto-edit/yolo non-interactively"
      - "--continue/--resume/--session-id/--fork-session need chat recording ON (default) — do NOT pass --chat-recording false on a resumable dispatch"
      - "cd does not persist between shell calls — pass the workspace via CWD + --add-dir, never rely on cd chaining"
      - "--json-file <path> does NOT materialize headless on the RBTV qwen fork — CONFIRMED across 3 runs 2026-06-10. Do NOT rely on it for a durable return — capture stdout JSON (--output-format json); reconcile the return against disk regardless"
      - "reasoning_modes.depths UNKNOWN — per-backend thinking depth is not exposed through the qwen-code CLI (G1 CLOSED as accepted limitation); do not assume effort can be controlled per-dispatch"

    # --- guidance file (routing §4 pre-dispatch check) ---
    guidance_file:
      convention: QWEN.md           # Qwen natively loads QWEN.md (project + ~/.qwen/QWEN.md, hierarchical, @import syntax); AGENTS.md supported via the context.fileName setting
      mirror_entry: qwen-mirror      # resolves to: python orchestration/models/mirror/mirror.py --config orchestration/models/qwen-code-cli/mirror-config.yaml --target <workspace>

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
    swarm_support:
      subagents: true               # `agent` tool — the worker can dispatch its own sub-tasks
      nesting: one-level            # treat as one-level (sub-tasks do not recurse) — matches kimi + D7 depth cap ≤2
      default: disabled             # safe default posture for bounded dispatches; enable ONLY for independent slices with disjoint allowlists

    os_quirks:
      windows: "positional prompt AND stdin pipe both work (Get-Content file | qwen \"...\"); config root %USERPROFILE%\\.qwen\\; --sandbox needs Docker/Podman (unverified here); exit codes 0/1/53/55/130 propagate to $LASTEXITCODE"

