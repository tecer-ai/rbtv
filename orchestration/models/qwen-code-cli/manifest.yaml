      mcp: true
      agent_file: true
    confinement:
      workspace_scope: "CWD root + --include-directories/--add-dir; --worktree for isolation"
      tool_restriction: "--exclude-tools / --allowed-tools / --core-tools; --approval-mode graded gate"
      write_enforcement: git-diff-vs-allowlist
    invocation_pointer: ./manual.md
    manual_path: ./manual.md
    delta_path: ./delta.md
    specialty: "cheapest large-output bounded code via DeepSeek V4 Flash — the validated bulk code executor (full done-gate 2026-06-10); pick over `default` when single-turn output may exceed ~64K tokens"
    failure_modes:
      - "same qwen CLI failure modes as `default` (headless yolo host-privilege, auto denies writes, exit 1 auth gate, exit 53/55 budgets, cd non-persistence) — see the default variant"
      - "DASHSCOPE_API_KEY must resolve; PRE-PROVISIONED in qwen's ~/.qwen/settings.json → resolves in ANY session (conductor/unattended dispatches authenticate directly; bound spend with budget/--max-wall-time)"
    swarm_support:
      subagents: true
      nesting: one-level
      default: disabled

