    specialty: "fleet diversity — a non-DeepSeek non-Qwen agentic-coding backend (Z.AI GLM-5.1); pick when model diversity is wanted and the task fits ~200K context"
    evidence_status: probe-pending  # served (reply-probe 2026-06-10) but no directed bounded-code run; ModelStudio-US cost vs pro unconfirmed — graduates on a bounded-code pilot + live cost truth
    failure_modes:
      - "same qwen CLI failure modes as `default` — see the default variant"
      - "smaller context (204,800) than the DeepSeek/Qwen backends — split large-context tasks or route them to a 1M backend"
