# Qwen capability manifest — the routing card's data interface for the qwen-code-cli package.
# Schema + field meanings + routing-card consumers: ../manifest-schema.md
# Source: 1-projects/rbtv-evolution/orchestration/qwen/qwen-cli-reference.md (the p3-8 findings report;
#         Qwen Code CLI 0.17.1 verified locally on Windows 11, 2026-06-07 — flags/subcommands/exit-codes
#         from the installed `qwen --help`). Multi-model backend mechanism + verified per-backend specs:
#         1-projects/rbtv-evolution/orchestration/qwen-multi-model/qwen-multi-model-research.md (2026-06-10).
# Evidence boundary: the CLI install + headless contract + flag-parsing are locally verified. The full
#         authenticated turn (exit-0, JSON output shape, tool-calling, attribution) IS NOW VALIDATED —
#         2026-06-10 (validation runs issued via `!`; auth is pre-provisioned in qwen's own ~/.qwen/settings.json
#         `env` block and resolves in ANY session — conductor/unattended included, see auth notes below): all four ModelStudio US
#         backends (qwen3.6-plus, deepseek-v4-flash, deepseek-v4-pro, glm-5.1) reply-probed exit-0 with
#         init.model echoing the id, and `deepseek-v4-flash` passed a full bounded-code done-gate
#         (write+test through the compatible-mode shim, conductor-reconciled on disk). Evidence:
#         1-projects/rbtv-evolution/coding/done-gate-evidence/rbtv/2026-06-10-qwen-multi-model.md.
# The exact invocation shape (commands, flags, approval grammar, exit codes, resume, per-backend `-m`) is
# in ./manual.md (rendered from ./delta.md by ../render-manuals.py) — this manifest points to it.

model: qwen-code-cli
display: "qwen-code (CLI)"
evidence_status: validated   # auth verified + all four ModelStudio US backends served; ALL FOUR now carry full bounded-code proof — default (qwen3.6-plus) + deepseek-v4-flash 2026-06-10, deepseek-v4-pro + glm-5.1 2026-06-10 follow-up pilots (per-variant overrides below graduated probe-pending→validated).
permission_rules:            # installer-managed allowlist entries in the target's .claude/settings.local.json (D17) — added when this package is elected, removed when deselected; schema: ../manifest-schema.md
  - "Bash(qwen:*)"
  - "PowerShell(qwen:*)"

# --- Multi-model backends (ModelStudio US, OpenAI-compatible) ---
# The owner runs qwen against four configured backends via ~/.qwen/settings.json `modelProviders.openai`
# (all on https://dashscope-us.aliyuncs.com/compatible-mode/v1 under DASHSCOPE_API_KEY). Per-dispatch
# selection adds ONE flag to the canonical invocation: `--auth-type openai -m <id>` (omitting -m falls back
# to the configured model.name = qwen3.6-plus). Each backend below is a routable variant ONLY where a
# routing-relevant field differs (variant field-count discipline, manifest-schema §107). All four share the
# qwen CLI contract (exit codes, confinement, resume, tool surface) — only the routing fields differ.

variants:
  - variant: default   # qwen3.6-plus — the configured model.name (no -m needed); native Apr-2026 flagship coder. The home backend.
    display: "Qwen3.6 Plus"   # installer backend-election label (per-variant; installer-consumed, NOT a routing input — schema §2)

    # --- boundedness + sizing (routing §2, §8) ---
    reasoning_tier: mid             # HELD at mid + doubt_policy: halt. ⚑ UNDER-RATED per published benchmark (Qwen3.6-Plus 78.8% SWE-V, independent: HF/Willison/Register ≈ Sonnet 79.6) — judgment-pilot candidate, NOT bumped (SWE measures code; code_competence already strong; judgment unpiloted). Re-sourced from spec → benchmark 2026-06-11
    context_window: 1048576         # 1M native (qwen3.6-plus); the configured ModelStudio backend. Earlier 131072 figure was the local-setup docs EXAMPLE, not this backend (research §3)
    max_output: 65536               # qwen3.6-plus single-turn cap (research §3). Smaller than the DeepSeek backends (384K) — the routing distinction for large-output code tasks
    cost_class: low                 # DashScope tiered: $0.28/$1.65 per 1M (0–256K band) (research §3 [4][5]). ModelStudio-US billing unconfirmed (research Q2) — reference-derived

    # --- budget + capability gates (routing §2, §6) ---
    code_competence: strong         # purpose-built coding agent — shell/file/edit tools + built-in PR-review (report §15)
    web_access: false               # NO guaranteed native web-search tool — tool/MCP-dependent; provision via MCP if a research leaf needs web, else false. (qwen is NOT the web research-leaf executor — codex/claude-cli are; core-protocol roster corrected 2026-06-10, D-exec-11)
    # multimodal omitted — qwen3.6-plus image input is gateway-documented but CLI-path-unverified (research §3) → omit until exercised

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # --worktree gives native per-session git-worktree isolation (<repoRoot>/.qwen/worktrees/<slug>/); concurrent instances under disjoint dirs supported (report §7/§15)
    resume_support: continue        # --continue / --resume <id> / --session-id / --fork-session; ALL require chat recording on (default) (report §15)

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    headless:
      flags: "<positional-prompt> --output-format json --approval-mode <auto|auto-edit|yolo>"   # positional prompt canonical on 0.17.1 (-p deprecated-but-functional); headless = prompt non-interactively WITHOUT -i (report §2/§5/§15)
      auto_approves_tools: true     # true under --yolo/--approval-mode yolo (probe-confirmed host-privilege warning, no sandbox); headless `auto` DENIES writes (live-proven p2-3) (report §2/§15)
      prompt_transport: either      # positional arg OR stdin pipe — a positional/-p prompt is appended to stdin content (report §5/§15)

    # --- auth pre-flight (routing §1) ---
    auth:
      required: true                # unauthenticated `qwen -p` exits 1 "No auth type is selected" — verified locally (report §8/§15)
      method: api-key               # openai/anthropic/gemini env+keys; here: --auth-type openai + DASHSCOPE_API_KEY (ModelStudio US). cli-login (qwen-oauth) free tier discontinued 2026-04-15
      interactive: false            # api-key path: availability = the key resolves (DASHSCOPE_API_KEY); no human gesture per dispatch (schema §4 api-key note). The key is PRE-PROVISIONED in qwen's own ~/.qwen/settings.json `env` block → it resolves in ANY session (conductor/unattended included), so live dispatches authenticate directly — NOT owner-run-only (corrected 2026-06-11, C2). SECURITY: any run can spend ModelStudio credit — bound with budget/--max-wall-time

    rate_budget_notes: "NO retryable-throttle exit code (unlike kimi 75) — set QWEN_CODE_UNATTENDED_RETRY=1 for in-process 429/529 backoff (cap 5 min, 30s stderr heartbeat); bound with --max-wall-time → exit 55. Budget overruns: --max-session-turns → exit 53; --max-wall-time/--max-tool-calls → exit 55. exit 1 = non-retryable (auth/config/usage) → halt + surface. Auth via --auth-type openai + DASHSCOPE_API_KEY (ModelStudio US)."

    # --- tool surface + confinement (routing §2, §4, §8) ---
    tool_surface:
      native: [shell, file, edit, agent]   # shell/file/edit + the `agent` tool (subagent dispatch); built-in PR-review; extensions add more (report §12/§15)
      mcp: true                     # qwen mcp add/list/reconnect, --mcp-config <json|file>, --allowed-mcp-server-names (report §9/§15)
      agent_file: true              # --system-prompt/--append-system-prompt per-run; tool restriction via --allowed-tools/--exclude-tools/--core-tools; guidance via QWEN.md/AGENTS.md (report §15)
    confinement:
      workspace_scope: "CWD root + --include-directories/--add-dir (additive; NO single --work-dir flag); --worktree for isolation"   # report §7/§15
      tool_restriction: "--exclude-tools / --allowed-tools / --core-tools; --approval-mode graded gate; --sandbox container (backend-unverified on Windows)"   # report §7/§15
      write_enforcement: git-diff-vs-allowlist   # headless --yolo auto-approves all at host privilege, no sandbox — post-run git diff of every changed path vs the task allowlist is the reliable check (report §7/§15)

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md   # rendered dispatch manual (../render-manuals.py) — the exact command shape
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/qwen-code-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/qwen-code-cli/delta.md
    specialty: "bounded code/agentic via the native Qwen3.6 flagship — purpose-built coding agent (shell/file/edit + built-in PR-review) with native --worktree isolation; the no-`-m` home backend (text synthesis → DeepSeek API worker)"   # within-tier tiebreaker only; boundedness-first stays the master cut
    # --- configurable model (ADX-2 / D6 / Brief B Part 2 — qwen serves a CONFIGURABLE backend set, not a fixed identity) ---
    configurable_model:
      provider_label: "qwen-code (DashScope US)"   # installer backend-election provider-path label (installer-consumed; not a routing input)
      is_configurable: true          # the model the qwen CLI runs is CONFIGURATION, not a fixed package identity — the owner runs qwen against four ModelStudio US backends (native Qwen3.6 PLUS deepseek-v4-flash/pro and glm-5.1); the served model is set per-run via -m, modeled as the four variants here
      note: "served backend set by --auth-type openai + -m <id> (qwen3.6-plus | deepseek-v4-flash | deepseek-v4-pro | glm-5.1), all on ModelStudio US under DASHSCOPE_API_KEY; availability/attribution resolve the CONFIGURED id at dispatch (init.model echoes it), never assume from the package name. Per-backend variants modeled 2026-06-10 (Brief B Part 2 — was deferred, now DONE)"
    failure_modes:
      - "headless --yolo/--approval-mode yolo auto-approves ALL tool calls at host privilege — NO sandbox unless --sandbox (container backend unverified on Windows); enforce scope externally + post-run diff"
      - "headless --approval-mode auto DENIES every write/edit/shell call (read-only in practice) — use yolo/-y for headless write work (live-proven p2-3)"
      - "unauthenticated run exits 1 (No auth type is selected) — DASHSCOPE_API_KEY must resolve; it is PRE-PROVISIONED in qwen's own ~/.qwen/settings.json `env` block and resolves on EVERY qwen invocation by this user, so conductor/unattended dispatches authenticate directly (proven C2 2026-06-10). SECURITY: any run can spend ModelStudio credit — bound with budget/--max-wall-time. If settings.json ever loses the key/auth, HALT and ask the owner to re-provision — the conductor never self-provisions, reads, or prints it"
      - "NO retryable-throttle exit code — use QWEN_CODE_UNATTENDED_RETRY=1 for in-process 429/529 backoff; bound with --max-wall-time"
      - "budget overrun → exit 53 (--max-session-turns) or 55 (--max-wall-time/--max-tool-calls) — re-scope or raise caps, NOT a transient retry"
      - "--approval-mode default STALLS a headless run waiting for approval — always set auto/auto-edit/yolo non-interactively"
      - "--continue/--resume/--session-id/--fork-session need chat recording ON (default) — do NOT pass --chat-recording false on a resumable dispatch"
      - "cd does not persist between shell calls — pass the workspace via CWD + --add-dir, never rely on cd chaining"
      - "--json-file <path> does NOT materialize headless on the RBTV qwen fork — CONFIRMED across 3 runs 2026-06-10 (flash, deepseek-v4-pro, glm-5.1; absolute path, file absent every time). Do NOT rely on it for a durable return — capture stdout JSON (--output-format json), or use --json-schema (untested here); reconcile the return against disk regardless"

    # --- guidance file (routing §4 pre-dispatch check) ---
    guidance_file:
      convention: QWEN.md           # Qwen natively loads QWEN.md (project + ~/.qwen/QWEN.md, hierarchical, @import syntax); AGENTS.md supported via the context.fileName setting (report §11/§15)
      mirror_entry: qwen-mirror      # resolves to: python orchestration/models/mirror/mirror.py --config orchestration/models/qwen-code-cli/mirror-config.yaml --target <workspace>

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
    swarm_support:
      subagents: true               # `agent` tool — the worker can dispatch its own sub-tasks (--max-tool-calls docs: "agent tool dispatch = 1; inner calls exempt") (report §12/§15)
      nesting: one-level            # treat as one-level (sub-tasks do not recurse) — matches kimi + D7 depth cap ≤2
      default: disabled             # safe default posture for bounded dispatches; enable ONLY for independent slices with disjoint allowlists (report §12)

    os_quirks:
      windows: "positional prompt AND stdin pipe both work (Get-Content file | qwen \"...\"); config root %USERPROFILE%\\.qwen\\; --sandbox needs Docker/Podman (unverified here); exit codes 0/1/53/55/130 propagate to $LASTEXITCODE"   # report §14/§15

