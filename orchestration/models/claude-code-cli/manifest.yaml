      windows: "MANDATORY stdin redirect: `$null | claude -p ...` (PowerShell) or `< NUL` (cmd) or `< /dev/null` (bash) — without it the CLI waits 3s then warns 'no stdin data received in 3s, proceeding without it' (probe C1), wasting latency and polluting text stdout (probe environment: Windows 11, Claude Code 2.1.168). Trust $LASTEXITCODE: 0 = success (is_error:false), 1 = arg-parse/usage error fast (0.4s) BEFORE any API spend (probe H6). Probe-observed durations 0.4-10.1s; no hang was engineered"

