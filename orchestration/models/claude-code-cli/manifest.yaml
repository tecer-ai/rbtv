# Claude-cli capability manifest — the routing card's data interface for the claude-code-cli package.
# Schema + field meanings + routing-card consumers: ../manifest-schema.md
# Sources: p3-6 in-house probe: 1-projects/rbtv-evolution/coding/done-gate-evidence/rbtv/2026-06-07-claude-cli-probe.md
#   (+ sibling capture folder 2026-06-07-claude-cli-probe/; capture filenames cited in ./delta.md).
#   Probe environment: Windows 11, Claude Code 2.1.168. Verdict HELD — the D7 nesting override is validated in-house.
#   claude --help (probe capture helper-help.txt) — flag source of truth for the installed build.
#   Claude sub-agent learnings: 1-projects/rbtv-evolution/orchestration/learnings/learnings-claude-subagents.md
#   (the opus/sonnet/haiku role→tier mapping the variants below encode).
#   Corroboration: 3-resources/knowledge-base/raw/medium/2026-06-06-building-a-production-agent-harness-*.md
#   (headless Claude via --permission-mode bypassPermissions; writes-outside-scope auto-reverted via git diff;
#    `git push`/operation exit code is ground truth, never the model's prose; session resume by UUID; worktree isolation).
# Capability values (reasoning/coding/cost integers + evidence) transcribed from:
#   value-derivation.md (2026-06-16 ratified table, R2 final) — board source AA leaderboard.
# The exact invocation shape (commands, flags, exit codes, resume, the unique native-CLAUDE.md property) is in ./manual.md
# (rendered from ./delta.md by ../render-manuals.py) — this manifest points to it, never duplicates it.
#
# UNIQUE among the model packages: claude-code-cli is Claude-as-a-CLI-worker. It natively auto-loads the cwd workspace
# CLAUDE.md/rules/skills (probe H5 — proven), unlike Agent-tool helpers and unlike the other CLI workers. Because the
# workspace's OWN CLAUDE.md IS the guidance file, there is NO mirror: `guidance_file` records the native convention but
# omits `mirror_entry` (no mirror-config.yaml ships — see ./delta.md "Workspace rooting" and ../../../shape.md mirror ruling).
# Same Claude budget as the conductor — selecting claude-code-cli is NOT cost arbitrage (no cheaper-provider saving like kimi).
#
# SCHEMA MIGRATION (2026-06-16, p2-m-cli): old band/tier fields replaced by integer 1–7 per manifest-schema.md §0/D11.
# Fable RE-ADDED to roster 2026-07-07 (access reopened — supersedes the D15 drop; see ../../skills/orchestrating/cards/routing.md §3).
# Haiku ADDED per value-derivation.md. reasoning_modes axis stores effort ladder (5 levels for opus/sonnet/fable; [] for haiku single-mode).

model: claude-code-cli
display: "claude-code (CLI)"
evidence_status: validated   # the invocation contract (launch from a helper, JSON envelope, --model, acceptEdits, native CLAUDE.md load, --resume, exit semantics) is in-house probe-HELD (p3-6). The first real ORCHESTRATED sub-conductor dispatch through this manual was the p5-2 smoke probe. A full task-bearing dispatch + the --effort max profile are now VALIDATED IN PRODUCTION (2026-06-25, rbtv-sb component-review finalize: 10× `claude -p --model opus --effort max --permission-mode acceptEdits` review dispatches, every one is_error:false / exit 0, each a complete multi-section deliverable, ≈$2.9-4/call). Deep recovery (halt/resume/repair) remains unexercised.
permission_rules:            # installer-managed allowlist entries in the target's .claude/settings.local.json — added when this package is elected, removed when deselected; schema: ../manifest-schema.md
  - "Bash(claude:*)"
  - "PowerShell(claude:*)"

variants:
  - variant: fable   # the senior-conductor / final-plan-review profile — premium top-tier Claude (Fable 5) as a CLI worker
    # RE-ADDED 2026-07-07: access reopened. NOTE — the live-dispatch evidence below is CARRIER-SPECIFIC: the
    # observed 2026-07-07 success was an Agent-tool `model: fable` dispatch (../claude-code-native/manifest.yaml),
    # NOT a `claude -p --model claude-fable-5` CLI run. This CLI package's fable variant therefore stays
    # probe-pending until a CLI-side dispatch confirms the --model flag + JSON envelope for claude-fable-5.
    # Supersedes the D15 drop (2026-06-17, access-gated) recorded in ../../skills/orchestrating/cards/routing.md §3.
    # Placed ABOVE opus — it is the senior-most variant in this package.
    available: true                  # explicit re-enable (../manifest-schema.md §2) — the variant carried `available: false` while access-gated (2026-06-14→17) and was then REMOVED outright by D15; re-added now that access has reopened, with an explicit true (not just an absent field) to document the re-add decision in place
    evidence_status: probe-pending   # claude-fable-5 was NOT in the p3-6 probe matrix (opus/sonnet/haiku only) and has not been CLI-dispatched since re-add; the CLI contract (flags, --model, JSON envelope, exit semantics) is presumed identical to opus — only the model id differs — but is not yet probe-confirmed on THIS carrier. Re-confirm via a JSON probe (modelUsage.{contextWindow,maxOutputTokens}) on first CLI dispatch. Contrast ../claude-code-native/manifest.yaml, whose fable variant IS validated — the 2026-07-07 live dispatch was on that carrier, not this one

    # --- capability + cost scores + sizing (routing §2, §8) — scale: schema §0 (integer 1–7, comparable across all models) ---
    reasoning: 7                           # owner-approved (conductor decision, this run) — Fable 5 is not on the AA leaderboard; no board-derived score exists. Set at the ceiling, matching opus's frontier reasoning score
    coding: 7                              # owner-approved (conductor decision, this run) — same no-board-data basis as reasoning; set at the ceiling, above opus's coding score, reflecting fable's senior-most positioning
    cost: 7                                # owner-approved (conductor decision, this run) — the premium price tier: `7` (priciest) ranks LAST in the §2a cost-ascending RANK, so it is never auto-picked on a cost tie; reached ONLY via the conductor / final-plan-reviewer pins (routing §3)
    axis_evidence:
      reasoning: { source: "owner-approved; Fable 5 not on AA leaderboard — no board data", confidence: "n/a" }
      coding:    { source: "owner-approved; Fable 5 not on AA leaderboard — no board data", confidence: "n/a" }
    cost_evidence: { source: "owner-approved; Fable 5 not on AA leaderboard — no board data (premium tier pin)", confidence: "n/a" }
    context_window: 1000000         # claude-fable-5 1M-context tier; user/config-dependent — re-confirm via a JSON probe (modelUsage.contextWindow) on the target machine, NOT a constant to assume
    max_output: 128000               # claude-fable-5 single-turn output ceiling (docs cap; model/provider-determined); JSON modelUsage.maxOutputTokens reports the live value per dispatch — read it there rather than assuming. HIGHER than opus's 64000, one of the routing-relevant fields distinguishing this variant

    # --- role eligibility (routing §2, §6) ---
    web_access: true                # Claude Code carries native web tools (WebSearch/WebFetch) + the rbtv-web-searching skill when run in an rbtv workspace; research-leaf capable
    # multimodal: [image]           # Claude accepts image input in interactive use; OMITTED — no image dispatch was probed (validated-evidence-only; add only after an image-path probe)

    # --- reasoning / effort modes (routing §2 post-pin effort=f(boundedness) — schema §0a) ---
    reasoning_modes:
      depths: [low, medium, high, xhigh, max]   # same 5-level Claude effort ladder as opus (measurable per [prep] §13) — no schema basis to give fable a different ladder
      invocation: "--effort {level}"
      carrier: "CLI-only via claude -p"

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # independent `claude -p` invocations are separate OS subprocesses — runnable concurrently under disjoint allowlists / separate worktrees. Concurrent-wave behavior for fable specifically is not stress-probed — verify on first parallel use; isolate parallel code workers in worktrees
    resume_support: session-id      # same CLI contract as opus: a JSON run emits session_id; `claude -p --resume <session_id> "<next>"` continues the prior turn. --fork-session forks; --session-id <uuid> pins an id; --no-session-persistence disables save

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    headless:
      flags: "-p --model claude-fable-5 --output-format json"   # -p / --print = non-interactive print-and-exit; explicit --model claude-fable-5 (confirm via JSON modelUsage the actual model the flag honored) + json envelope (result, session_id, total_cost_usd, modelUsage.{contextWindow,maxOutputTokens}, permission_denials[], is_error, num_turns, duration_ms)
      auto_approves_tools: false    # claude -p does NOT auto-approve every tool by default — permission MODE governs it. For unattended writes pass --permission-mode acceptEdits; the default permission mode is NOT guaranteed read-only — specify the mode explicitly, never rely on bypassPermissions for confinement
      prompt_transport: arg         # the prompt is the -p argument; stdin MUST be redirected ($null | / < NUL / < /dev/null) or the CLI waits 3s then warns "no stdin data received in 3s" — see os_quirks.windows. A large prompt is written to a prompt file and passed as the arg

    # --- auth pre-flight (routing §1 → halt-recovery USER-EXECUTED-ONLY) ---
    auth:
      required: true
      method: cli-login             # Claude Code CLI is already authenticated on a machine running this orchestration (the conductor IS Claude Code) — same login as opus/sonnet/haiku
      interactive: false            # on a machine where Claude Code already runs, no fresh interactive auth is needed for `claude -p`. A brand-new machine needs a one-time interactive `claude` login (USER-EXECUTED-ONLY) — the conductor's own setup, not a per-dispatch pre-flight

    rate_budget_notes: "same Claude account/budget as the conductor — NOT a cheaper-provider saving (contrast kimi/codex). Per-call cost from JSON total_cost_usd once dispatched. Budget guards available, not yet probed for this variant: --max-budget-usd <amount> and --fallback-model <model> — relevant when an autonomous dispatch must cap spend. Invalid flag → exit 1 BEFORE any API spend, so a malformed dispatch wastes nothing. Premium cost (7) makes the spend visible to the budget filter, but fable is reached via the conductor / final-plan-reviewer PINS (routing §3), never the cost-ascending selector"

    # --- tool surface + confinement (routing §2, §4, §8) ---
    tool_surface:
      native: [shell, file, web]    # full Claude Code tool surface: Bash (shell), Read/Edit/Write (file), WebSearch/WebFetch (web), plus Glob/Grep/Task etc. --allowedTools / --disallowedTools scope the set
      mcp: true                     # Claude Code loads MCP servers (--mcp-config / the workspace .mcp.json); the conductor's MCP catalog is available to a same-workspace dispatch
      agent_file: false             # no per-dispatch agent-file tool spec like kimi's --agent-file. The tool set is governed by --allowedTools/--disallowedTools + --permission-mode (+ the natively-loaded workspace CLAUDE.md rules), not an agent file
    confinement:
      workspace_scope: "cwd (run FROM the target workspace root) + --add-dir <dir> for extra dirs"   # primary scoping; cwd doubles as the CLAUDE.md auto-load root (see guidance_file). --add-dir grants tool access beyond cwd
      tool_restriction: "--allowedTools / --disallowedTools (allow/deny tool families) + --permission-mode; NO agent-file"
      write_enforcement: git-diff-vs-allowlist   # confinement is the orchestrator's job: --permission-mode acceptEdits AUTHORIZES writes but does not BOUND them to an allowlist — back every dispatch with the post-run git diff --name-only vs the task allowlist. Out-of-allowlist = halt + surface, never auto-revert

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md   # rendered dispatch manual (../render-manuals.py) — the exact command shape
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant (pinnable into task frontmatter; never re-derived) — resolves to models/claude-code-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/claude-code-cli/delta.md
    specialty: "premium process-boundary sub-conductor with native workspace-rule loading — the Fable 5 carrier the routing pins reach for the conductor and final-plan-reviewer roles, itself able to drive CLI workers (clears the nesting wall as a separate process) and natively auto-load the cwd CLAUDE.md/rules. The conductor/reviewer PIN itself lands at the routing card (§3), not here"   # within-tier tiebreaker only (fable vs opus, both top-tier); boundedness-first stays the master cut
    failure_modes:
      - "stdin not redirected → 3s stdin-wait + a 'no stdin data received in 3s' warning that pollutes text stdout; ALWAYS redirect stdin ($null | / < NUL / < /dev/null)"
      - "default permission mode is NOT guaranteed read-only — the probe's no-flag write control still wrote the file (H4-default on opus/sonnet); pass --permission-mode acceptEdits explicitly for an intended unattended write, and NEVER rely on the default for confinement"
      - "--permission-mode authorizes but does not BOUND writes to an allowlist — back every dispatch with post-run git diff --name-only vs the allowlist (the only reliable write confinement; confinement is the orchestrator's job)"
      - "nesting depth: a claude -p worker is a sub-conductor at depth 2 (conductor → claude -p). It can shell out again, but the depth cap ≤2 FORBIDS relying on deeper Agent-tool nesting — do not design a claude -p worker to dispatch its own Agent-tool sub-agents"
      - "final-turn drop on a CLI worker is possible (the generic CLI-worker lossy-return class) — the JSON envelope or message is a HINT; reconcile landed/validation against git status / git log + cited evidence files on disk. exit 0 + is_error:false is ground truth, not the prose"
      - "--bare DISABLES CLAUDE.md auto-discovery (per --help) — never pass it when the worker needs the workspace rules; it is the opposite of the native-rooting property claude-code-cli is selected for"
      - "model-id NOT probe-confirmed on THIS carrier — claude-fable-5 was authored from docs and validated live only on the Agent-tool carrier (2026-07-07), not observed in a `claude -p` probe. The --model flag is honored only if the id is valid on the target build; confirm via JSON modelUsage on first CLI dispatch, and treat a model-not-found exit as a config gap, not a code bug"
      - "premium-cost surprise: fable is the priciest Claude tier (cost 7). NEVER route to fable on a cost tie — the priciest bin ranks LAST in cost-ascending selection precisely so the selector cannot auto-pick it; reach fable ONLY via the conductor / final-plan-reviewer pins"

    # --- guidance file (routing §4 pre-dispatch check) ---
    guidance_file:
      convention: CLAUDE.md         # CLI-Claude NATIVELY auto-loads the cwd workspace CLAUDE.md (and its rules/skills) and obeys it — same as opus/sonnet/haiku
      # mirror_entry: OMITTED — NO mirror for claude-code-cli. The workspace's OWN CLAUDE.md IS the guidance file; it is loaded natively, not generated.

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
    swarm_support:
      subagents: true               # Claude Code has the Task (Agent) tool — a claude -p fable worker CAN launch its own Agent-tool sub-agents in principle. But the 4× documented nesting wall blocks a sub-agent from spawning further sub-agents, and the depth cap ≤2 forbids relying on it. A claude -p worker IS a sub-conductor (the process-boundary escape); it sub-conducts via further CLI subprocesses, not via deeper Agent nesting
      nesting: one-level            # depth cap ≤2: conductor → claude -p (one process boundary). The claude -p worker must NOT be designed to nest Agent-tool sub-agents beneath itself
      default: disabled             # safe default: dispatch claude -p as a leaf/sub-conductor worker, not as a fan-out parent. Enable sub-conducting only deliberately, within the depth cap

    os_quirks:
      windows: "MANDATORY stdin redirect: `$null | claude -p ...` (PowerShell) or `< NUL` (cmd) or `< /dev/null` (bash) — without it the CLI waits 3s then warns 'no stdin data received in 3s, proceeding without it', wasting latency and polluting text stdout. Trust $LASTEXITCODE: 0 = success (is_error:false), 1 = arg-parse/usage error fast BEFORE any API spend"

  - variant: opus   # the judgment-dense / sub-conductor profile — max-reasoning Claude as a CLI worker

    # --- capability + cost scores + sizing (routing §2, §8) — scale: schema §0 (integer 1–7, comparable across all models) ---
    reasoning: 7                           # AA II 61 (#2 globally on-board); GPQA 53; HLE 46 — frontier
    coding: 6                              # Terminal-Bench Hard 58 — strong agentic coder (SciCode cross-check 62 noted in value-derivation native table; cli coding evidence is TBH-only per value-derivation cli table)
    cost: 6                                # board blended price $3.85/1M → bin 6 (premium); subscription@board-price,no-discount (D11)
    axis_evidence:
      reasoning: { source: "aa-ii(61);gpqa(53);hle(46)", confidence: high }
      coding:    { source: "aa-tbh(58)", confidence: high }
    cost_evidence: { source: "aa-blended($3.85)→bin6; subscription@board-price,no-discount", confidence: high }
    context_window: 1000000         # probe-observed: the DEFAULT model on this machine was claude-opus-4-8[1m], JSON modelUsage.contextWindow = 1e6 (1M ctx); user-config-dependent — re-confirm via a JSON probe on the target machine, NOT a constant
    max_output: 64000               # claude-opus-4-8[1m] single-turn output ceiling (model/provider-determined); JSON modelUsage.maxOutputTokens reports the live value per dispatch — read it there rather than assuming

    # --- role eligibility (routing §2, §6) ---
    web_access: true                # Claude Code carries native web tools (WebSearch/WebFetch) + the rbtv-web-searching skill when run in an rbtv workspace; research-leaf capable
    # multimodal: [image]           # Claude accepts image input in interactive use; OMITTED — no image dispatch was probed in p3-6 (validated-evidence-only; add only after an image-path probe)

    # --- reasoning / effort modes (routing §2 post-pin effort=f(boundedness) — schema §0a) ---
    reasoning_modes:
      depths: [low, medium, high, xhigh, max]   # Claude's 5 effort levels, measurable per [prep] §13
      invocation: "--effort {level}"
      carrier: "CLI-only via claude -p"

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # independent `claude -p` invocations are separate OS subprocesses — runnable concurrently under disjoint allowlists / separate worktrees
    resume_support: session-id      # probe H7: a JSON run emits session_id; `claude -p --resume <session_id> "<next>"` restored the prior turn

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    headless:
      flags: "-p --output-format json"   # -p / --print = non-interactive print-and-exit; --output-format json yields the parseable envelope
      auto_approves_tools: false    # claude -p does NOT auto-approve every tool by default — permission MODE governs it. For unattended writes pass --permission-mode acceptEdits. GUARDRAIL: the probe's no-flag negative control ALSO wrote (H4-default) — the workspace default permission mode already permitted writes; do NOT assume default = read-only. Specify the mode explicitly
