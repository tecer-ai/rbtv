    confinement:
      workspace_scope: "cwd (run FROM the target workspace root) + --add-dir <dir> for extra dirs"
      tool_restriction: "--allowedTools / --disallowedTools (allow/deny tool families) + --permission-mode; NO agent-file"
      write_enforcement: git-diff-vs-allowlist   # confinement is the orchestrator's job: --permission-mode acceptEdits AUTHORIZES writes but does not BOUND them to an allowlist — back every dispatch with the post-run git diff --name-only vs the task allowlist

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/claude-code-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/claude-code-cli/delta.md
    specialty: "process-boundary sub-conductor with native workspace-rule loading — the Claude carrier that itself drives CLI workers (clears the nesting wall as a separate process) and natively auto-loads the cwd CLAUDE.md/rules"   # within-tier tiebreaker only; boundedness-first stays the master cut
    failure_modes:
      - "stdin not redirected → 3s stdin-wait + a 'no stdin data received in 3s' warning that pollutes text stdout (probe C1); ALWAYS redirect stdin ($null | / < NUL / < /dev/null)"
      - "default permission mode is NOT guaranteed read-only — the probe's no-flag write control still wrote the file (H4-default); pass --permission-mode acceptEdits explicitly for an intended unattended write, and NEVER rely on the default for confinement"
      - "--permission-mode authorizes but does not BOUND writes to an allowlist — back every dispatch with post-run git diff --name-only vs the allowlist (the only reliable write confinement; confinement is the orchestrator's job)"
      - "nesting depth: a claude -p worker is a sub-conductor at depth 2 (conductor → claude -p). It can shell out again, but the depth cap ≤2 FORBIDS relying on deeper Agent-tool nesting — do not design a claude -p worker to dispatch its own Agent-tool sub-agents"
      - "final-turn drop on a CLI worker is possible (the generic CLI-worker lossy-return class) — the JSON envelope or message is a HINT; reconcile landed/validation against git status / git log + cited evidence files on disk. exit 0 + is_error:false is ground truth, not the prose"
      - "--bare DISABLES CLAUDE.md auto-discovery (per --help) — never pass it when the worker needs the workspace rules; it is the opposite of the native-rooting property claude-code-cli is selected for"

    # --- guidance file (routing §4 pre-dispatch check) ---
    guidance_file:
      convention: CLAUDE.md         # CLI-Claude NATIVELY auto-loads the cwd workspace CLAUDE.md (and its rules/skills) and obeys it — probe H5-pos returned the planted codeword, H5-neg (no file) did not
      # mirror_entry: OMITTED — NO mirror for claude-code-cli. The workspace's OWN CLAUDE.md IS the guidance file; it is loaded natively, not generated.

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
    swarm_support:
      subagents: true               # Claude Code has the Task (Agent) tool — a claude -p worker CAN launch its own Agent-tool sub-agents in principle. But the 4× documented nesting wall blocks a sub-agent from spawning further sub-agents, and the depth cap ≤2 forbids relying on it
      nesting: one-level            # depth cap ≤2: conductor → claude -p (one process boundary, probe-exercised). The claude -p worker must NOT be designed to nest Agent-tool sub-agents beneath itself
