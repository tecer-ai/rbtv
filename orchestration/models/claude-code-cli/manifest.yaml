# Claude-cli capability manifest — the routing card's data interface for the claude-code-cli package.
# Schema + field meanings + routing-card consumers: ../manifest-schema.md
# Sources: p3-6 in-house probe: 1-projects/rbtv-evolution/coding/done-gate-evidence/rbtv/2026-06-07-claude-cli-probe.md
#   (+ sibling capture folder 2026-06-07-claude-cli-probe/; capture filenames cited in ./delta.md).
#   Probe environment: Windows 11, Claude Code 2.1.168. Verdict HELD — the D7 nesting override is validated in-house.
#   claude --help (probe capture helper-help.txt) — flag source of truth for the installed build.
#   Claude sub-agent learnings: 1-projects/rbtv-evolution/orchestration/learnings/learnings-claude-subagents.md
#   (the opus/sonnet/haiku role→tier mapping the variants below encode).
#   Corroboration: 3-resources/knowledge-base/raw/medium/2026-06-06-building-a-production-agent-harness-*.md
#   (headless Claude via --permission-mode bypassPermissions; writes-outside-scope auto-reverted via git diff;
#    `git push`/operation exit code is ground truth, never the model's prose; session resume by UUID; worktree isolation).
# Capability values (reasoning/coding/cost integers + evidence) transcribed from:
#   value-derivation.md (2026-06-16 ratified table, R2 final) — board source AA leaderboard.
# The exact invocation shape (commands, flags, exit codes, resume, the unique native-CLAUDE.md property) is in ./manual.md
# (rendered from ./delta.md by ../render-manuals.py) — this manifest points to it, never duplicates it.
#
# UNIQUE among the model packages: claude-code-cli is Claude-as-a-CLI-worker. It natively auto-loads the cwd workspace
# CLAUDE.md/rules/skills (probe H5 — proven), unlike Agent-tool helpers and unlike the other CLI workers. Because the
# workspace's OWN CLAUDE.md IS the guidance file, there is NO mirror: `guidance_file` records the native convention but
# omits `mirror_entry` (no mirror-config.yaml ships — see ./delta.md "Workspace rooting" and ../../../shape.md mirror ruling).
# Same Claude budget as the conductor — selecting claude-code-cli is NOT cost arbitrage (no cheaper-provider saving like kimi).
#
# SCHEMA MIGRATION (2026-06-16, p2-m-cli): old band/tier fields replaced by integer 1–7 per manifest-schema.md §0/D11.
# Fable REMOVED from roster (US-gov restricted; owner re-adds later). Haiku ADDED per value-derivation.md.
# reasoning_modes axis stores effort ladder (5 levels for opus/sonnet; [] for haiku single-mode).

model: claude-code-cli
display: "claude-code (CLI)"
evidence_status: validated   # the invocation contract (launch from a helper, JSON envelope, --model, acceptEdits, native CLAUDE.md load, --resume, exit semantics) is in-house probe-HELD (p3-6). The first real ORCHESTRATED sub-conductor dispatch through this manual is the p5-2 smoke probe — facets beyond the probe matrix (a full task-bearing dispatch, deep recovery) are exercised there.
permission_rules:            # installer-managed allowlist entries in the target's .claude/settings.local.json — added when this package is elected, removed when deselected; schema: ../manifest-schema.md
  - "Bash(claude:*)"
  - "PowerShell(claude:*)"

variants:
  - variant: opus   # the judgment-dense / sub-conductor profile — max-reasoning Claude as a CLI worker

    # --- capability + cost scores + sizing (routing §2, §8) — scale: schema §0 (integer 1–7, comparable across all models) ---
    reasoning: 7                           # AA II 61 (#2 globally on-board); GPQA 53; HLE 46 — frontier
    coding: 6                              # Terminal-Bench Hard 58 — strong agentic coder (SciCode cross-check 62 noted in value-derivation native table; cli coding evidence is TBH-only per value-derivation cli table)
    cost: 6                                # board blended price $3.85/1M → bin 6 (premium); subscription@board-price,no-discount (D11)
    axis_evidence:
      reasoning: { source: "aa-ii(61);gpqa(53);hle(46)", confidence: high }
      coding:    { source: "aa-tbh(58)", confidence: high }
    cost_evidence: { source: "aa-blended($3.85)→bin6; subscription@board-price,no-discount", confidence: high }
    context_window: 1000000         # probe-observed: the DEFAULT model on this machine was claude-opus-4-8[1m], JSON modelUsage.contextWindow = 1e6 (1M ctx); user-config-dependent — re-confirm via a JSON probe on the target machine, NOT a constant
    max_output: 64000               # claude-opus-4-8[1m] single-turn output ceiling (model/provider-determined); JSON modelUsage.maxOutputTokens reports the live value per dispatch — read it there rather than assuming

    # --- role eligibility (routing §2, §6) ---
    web_access: true                # Claude Code carries native web tools (WebSearch/WebFetch) + the rbtv-web-searching skill when run in an rbtv workspace; research-leaf capable
    # multimodal: [image]           # Claude accepts image input in interactive use; OMITTED — no image dispatch was probed in p3-6 (validated-evidence-only; add only after an image-path probe)

    # --- reasoning / effort modes (routing §2 post-pin effort=f(boundedness) — schema §0a) ---
    reasoning_modes:
      depths: [low, medium, high, xhigh, max]   # Claude's 5 effort levels, measurable per [prep] §13
      invocation: "--effort {level}"
      carrier: "CLI-only via claude -p"

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true             # independent `claude -p` invocations are separate OS subprocesses — runnable concurrently under disjoint allowlists / separate worktrees
    resume_support: session-id      # probe H7: a JSON run emits session_id; `claude -p --resume <session_id> "<next>"` restored the prior turn

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    headless:
      flags: "-p --output-format json"   # -p / --print = non-interactive print-and-exit; --output-format json yields the parseable envelope
      auto_approves_tools: false    # claude -p does NOT auto-approve every tool by default — permission MODE governs it. For unattended writes pass --permission-mode acceptEdits. GUARDRAIL: the probe's no-flag negative control ALSO wrote (H4-default) — the workspace default permission mode already permitted writes; do NOT assume default = read-only. Specify the mode explicitly
      prompt_transport: arg         # the prompt is the -p argument (probe: all H rows). stdin MUST be redirected ($null | / < NUL / < /dev/null) or the CLI waits 3s then warns "no stdin data received in 3s" — see os_quirks.windows

    # --- auth pre-flight (routing §1 → halt-recovery USER-EXECUTED-ONLY) ---
    auth:
      required: true
      method: cli-login             # Claude Code CLI is already authenticated on a machine running this orchestration — same login. No separate provisioning when dispatching on the same machine/user
      interactive: false            # on a machine where Claude Code already runs, no fresh interactive auth is needed for `claude -p`

    rate_budget_notes: "same Claude account/budget as the conductor — NOT a cost saving (no cheaper-provider arbitrage; contrast kimi/codex). Per-call cost from JSON total_cost_usd (probe: Opus ≈ $0.22, cache-creation-dominated on a cold first turn). Budget guards available, not probed: --max-budget-usd <amount> and --fallback-model <model> — relevant when an autonomous dispatch must cap spend. Invalid flag → exit 1 BEFORE any API spend (probe H6)"

    # --- tool surface + confinement (routing §2, §4, §8) ---
    tool_surface:
      native: [shell, file, web]    # full Claude Code tool surface: Bash (shell), Read/Edit/Write (file), WebSearch/WebFetch (web), plus Glob/Grep/Task etc.
      mcp: true                     # Claude Code loads MCP servers (--mcp-config / the workspace .mcp.json)
      agent_file: false             # no per-dispatch agent-file tool spec like kimi's --agent-file. Tool set governed by --allowedTools/--disallowedTools + --permission-mode
    confinement:
      workspace_scope: "cwd (run FROM the target workspace root) + --add-dir <dir> for extra dirs"
      tool_restriction: "--allowedTools / --disallowedTools (allow/deny tool families) + --permission-mode; NO agent-file"
      write_enforcement: git-diff-vs-allowlist   # confinement is the orchestrator's job: --permission-mode acceptEdits AUTHORIZES writes but does not BOUND them to an allowlist — back every dispatch with the post-run git diff --name-only vs the task allowlist

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/claude-code-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/claude-code-cli/delta.md
    specialty: "process-boundary sub-conductor with native workspace-rule loading — the Claude carrier that itself drives CLI workers (clears the nesting wall as a separate process) and natively auto-loads the cwd CLAUDE.md/rules"   # within-tier tiebreaker only; boundedness-first stays the master cut
    failure_modes:
      - "stdin not redirected → 3s stdin-wait + a 'no stdin data received in 3s' warning that pollutes text stdout (probe C1); ALWAYS redirect stdin ($null | / < NUL / < /dev/null)"
      - "default permission mode is NOT guaranteed read-only — the probe's no-flag write control still wrote the file (H4-default); pass --permission-mode acceptEdits explicitly for an intended unattended write, and NEVER rely on the default for confinement"
      - "--permission-mode authorizes but does not BOUND writes to an allowlist — back every dispatch with post-run git diff --name-only vs the allowlist (the only reliable write confinement; confinement is the orchestrator's job)"
      - "nesting depth: a claude -p worker is a sub-conductor at depth 2 (conductor → claude -p). It can shell out again, but the depth cap ≤2 FORBIDS relying on deeper Agent-tool nesting — do not design a claude -p worker to dispatch its own Agent-tool sub-agents"
      - "final-turn drop on a CLI worker is possible (the generic CLI-worker lossy-return class) — the JSON envelope or message is a HINT; reconcile landed/validation against git status / git log + cited evidence files on disk. exit 0 + is_error:false is ground truth, not the prose"
      - "--bare DISABLES CLAUDE.md auto-discovery (per --help) — never pass it when the worker needs the workspace rules; it is the opposite of the native-rooting property claude-code-cli is selected for"

    # --- guidance file (routing §4 pre-dispatch check) ---
    guidance_file:
      convention: CLAUDE.md         # CLI-Claude NATIVELY auto-loads the cwd workspace CLAUDE.md (and its rules/skills) and obeys it — probe H5-pos returned the planted codeword, H5-neg (no file) did not
      # mirror_entry: OMITTED — NO mirror for claude-code-cli. The workspace's OWN CLAUDE.md IS the guidance file; it is loaded natively, not generated.

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
    swarm_support:
      subagents: true               # Claude Code has the Task (Agent) tool — a claude -p worker CAN launch its own Agent-tool sub-agents in principle. But the 4× documented nesting wall blocks a sub-agent from spawning further sub-agents, and the depth cap ≤2 forbids relying on it
      nesting: one-level            # depth cap ≤2: conductor → claude -p (one process boundary, probe-exercised). The claude -p worker must NOT be designed to nest Agent-tool sub-agents beneath itself
      default: disabled             # safe default: dispatch claude -p as a leaf/sub-conductor worker, not as a fan-out parent

    os_quirks:
      windows: "MANDATORY stdin redirect: `$null | claude -p ...` (PowerShell) or `< NUL` (cmd) or `< /dev/null` (bash) — without it the CLI waits 3s then warns 'no stdin data received in 3s, proceeding without it' (probe C1), wasting latency and polluting text stdout (probe environment: Windows 11, Claude Code 2.1.168). Trust $LASTEXITCODE: 0 = success (is_error:false), 1 = arg-parse/usage error fast (0.4s) BEFORE any API spend (probe H6). Probe-observed durations 0.4-10.1s; no hang was engineered"

  - variant: sonnet   # the mid-tier / zero-context-verification profile — the default routable Claude-cli variant
    evidence_status: validated   # --model sonnet was probe-HELD (H3): JSON modelUsage named claude-sonnet-4-6, flag honored; same CLI contract as opus, only the model differs

    # --- capability + cost scores + sizing ---
    reasoning: 6                           # AA II 52 (bin 5 anchor) raised to 6 by Hard-Prompts cross-check (arena HP #2 of roster, Elo 1503) per D9
    coding: 5                              # Terminal-Bench Hard 53 — capable agentic coder
    cost: 5                                # board blended price $2.31/1M → bin 5; subscription@board-price,no-discount (D11)
    axis_evidence:
      reasoning: { source: "aa-ii(52);gpqa(47);hle(30);arena-hp(1503,#2)", confidence: high }
      coding:    { source: "aa-tbh(53)", confidence: high }
    cost_evidence: { source: "aa-blended($2.31)→bin5; subscription@board-price,no-discount", confidence: high }
    context_window: 200000          # probe H3: --model sonnet → JSON modelUsage.claude-sonnet-4-6 contextWindow = 2e5 (200K)
    max_output: 32000               # probe H3: --model sonnet → JSON modelUsage.claude-sonnet-4-6 maxOutputTokens = 32000 (NOT 64000 — that is the opus ceiling)

    # --- role eligibility ---
    web_access: true                # same native web tools + rbtv-web-searching; research-leaf capable

    # --- reasoning / effort modes ---
    reasoning_modes:
      depths: [low, medium, high, xhigh, max]   # Claude's 5 effort levels (same ladder as opus; settable via claude -p --effort)
      invocation: "--effort {level}"
      carrier: "CLI-only via claude -p"

    # --- parallelism + resume ---
    parallel_safe: true
    resume_support: session-id

    # --- non-interactive run ---
    headless:
      flags: "-p --model sonnet --output-format json"   # -p print mode + explicit --model sonnet (probe H3 honored it; JSON modelUsage proves the actual model) + json envelope
      auto_approves_tools: false    # same as opus: permission MODE governs; pass --permission-mode acceptEdits for unattended writes; default is NOT guaranteed read-only (H4-default)
      prompt_transport: arg         # same: prompt as the -p arg, stdin MUST be redirected

    # --- auth pre-flight ---
    auth:
      required: true
      method: cli-login
      interactive: false

    rate_budget_notes: "mid-tier Claude spend (≈ $0.04-0.17/call, cache-dominated cold) on the SAME Claude budget as the conductor — no cross-provider saving. Invalid flag → exit 1 before any spend (H6). Same --max-budget-usd / --fallback-model guards as the opus variant"

    # --- tool surface + confinement ---
    tool_surface:
      native: [shell, file, web]
      mcp: true
      agent_file: false
    confinement:
      workspace_scope: "cwd (run FROM the target workspace root) + --add-dir <dir>"
      tool_restriction: "--allowedTools / --disallowedTools + --permission-mode; NO agent-file"
      write_enforcement: git-diff-vs-allowlist   # back every dispatch with the post-run git diff vs allowlist; --permission-mode authorizes but does not bound writes

    # --- invocation + failures ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/claude-code-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/claude-code-cli/delta.md
    specialty: "process-worker verification with native workspace rules — cold-verify / recon as a claude -p process that natively auto-loads the cwd CLAUDE.md (the cheaper claude-code-cli tier; sub-conducting still floors at opus where judgment-dense)"   # within-tier tiebreaker only
    failure_modes:
      - "stdin not redirected → 3s wait + warning polluting text stdout; ALWAYS redirect stdin"
      - "default permission mode is NOT guaranteed read-only (H4-default) — pass --permission-mode acceptEdits explicitly for an intended write"
      - "--permission-mode authorizes but does not BOUND writes — back with post-run git diff vs allowlist"
      - "external-CLI CODE review must route to the OPUS variant (reviewer floor) — sonnet executes code but does not satisfy the code-review reviewer pin"
      - "final-turn drop possible — JSON/message is a HINT; reconcile against git status / git log + disk; exit 0 is ground truth"

    # --- guidance file ---
    guidance_file:
      convention: CLAUDE.md         # same native cwd CLAUDE.md auto-load
      # mirror_entry: OMITTED — no mirror (see the opus variant's note and ../../../shape.md mirror ruling)

    # --- swarm / sub-conducting ---
    swarm_support:
      subagents: true
      nesting: one-level
      default: disabled

    os_quirks:
      windows: "MANDATORY stdin redirect ($null | / < NUL / < /dev/null); trust $LASTEXITCODE (0 success, 1 arg-parse error before any spend)"

  - variant: haiku   # the single-mode cheapest Claude CLI tier — validated bounded-code executor (no effort ladder)
    # ADDED to the roster per value-derivation.md (owner re-review c7 — haiku tested + works; evidence_status: validated).
    # Haiku is a NO-OP single-mode on the CLI: claude-haiku-4-5 does not expose the effort ladder.
    # reasoning_modes: depths: [] reflects this — the effort step is a no-op for this variant.

    # --- capability + cost scores + sizing ---
    reasoning: 3                           # AA II 37 (board "Claude 4.5 Haiku") — weak-but-real reasoner
    coding: 2                              # Terminal-Bench Hard 27 — weak agentic coder
    cost: 3                                # board blended price $0.77/1M → bin 3; subscription@board-price,no-discount (D11)
    axis_evidence:
      reasoning: { source: "aa-ii(37);gpqa(43);hle(10)", confidence: high }
      coding:    { source: "aa-tbh(27)", confidence: high }
    cost_evidence: { source: "aa-blended($0.77)→bin3; subscription@board-price,no-discount", confidence: high }
    context_window: 200000          # claude-haiku-4-5 context window (re-confirm via JSON modelUsage on target machine)
    max_output: 32000               # claude-haiku-4-5 Claude-Code-observed single-turn worker cap (matches the probe-verified sibling sonnet @32000; the raw model API max is 64000 but this field records the carrier-observed cap — read JSON modelUsage.maxOutputTokens per dispatch)

    # --- role eligibility ---
    web_access: true                # Claude Code carries native web tools — same as opus/sonnet; haiku inherits the full claude-code-cli tool surface

    # --- reasoning / effort modes ---
    reasoning_modes:
      depths: []                    # Haiku is a single-mode no-op on the CLI — no effort ladder exposed (claude-haiku-4-5 = single-mode); the effort step is a no-op
      invocation: "none"
      carrier: "CLI-only via claude -p — Haiku single-mode (no effort dial)"

    # --- parallelism + resume ---
    parallel_safe: true
    resume_support: session-id

    # --- non-interactive run ---
    headless:
      flags: "-p --model haiku --output-format json"   # explicit --model haiku; same -p + json envelope as opus/sonnet
      auto_approves_tools: false    # same permission-MODE semantics as opus/sonnet; pass --permission-mode acceptEdits for unattended writes
      prompt_transport: arg         # same: prompt as the -p arg, stdin MUST be redirected

    # --- auth pre-flight ---
    auth:
      required: true
      method: cli-login
      interactive: false

    rate_budget_notes: "cheapest Claude tier on this package (cost 3 → $0.77/1M blended @ board price, no subscription discount per D11). Same Claude account/budget as the conductor. Invalid flag → exit 1 before any spend. Same --max-budget-usd / --fallback-model guards as opus/sonnet"

    # --- tool surface + confinement ---
    tool_surface:
      native: [shell, file, web]
      mcp: true
      agent_file: false
    confinement:
      workspace_scope: "cwd (run FROM the target workspace root) + --add-dir <dir>"
      tool_restriction: "--allowedTools / --disallowedTools + --permission-mode; NO agent-file"
      write_enforcement: git-diff-vs-allowlist

    # --- invocation + failures ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/claude-code-cli/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/claude-code-cli/delta.md
    specialty: "cheapest Claude CLI tier — haiku single-mode for fully-bounded mechanical batches within the Claude carrier (no effort dial; coding floor 2 — route mechanical, not reasoning-dense work here)"   # within-tier tiebreaker only
    failure_modes:
      - "stdin not redirected → 3s wait + warning polluting text stdout; ALWAYS redirect stdin"
      - "default permission mode is NOT guaranteed read-only — pass --permission-mode acceptEdits explicitly for an intended write"
      - "--permission-mode authorizes but does not BOUND writes — back with post-run git diff vs allowlist"
      - "single-mode no-op — no effort dial; --effort flag is a no-op on claude-haiku-4-5; do not route reasoning-dense or judgment-dense work here"
      - "final-turn drop possible — JSON/message is a HINT; reconcile against git status / git log + disk; exit 0 is ground truth"

    # --- guidance file ---
    guidance_file:
      convention: CLAUDE.md         # same native cwd CLAUDE.md auto-load
      # mirror_entry: OMITTED — no mirror (see the opus variant's note and ../../../shape.md mirror ruling)

    # --- swarm / sub-conducting ---
    swarm_support:
      subagents: true               # haiku has the Task (Agent) tool in principle; same depth-cap constraint as opus/sonnet
      nesting: one-level
      default: disabled

    os_quirks:
      windows: "MANDATORY stdin redirect ($null | / < NUL / < /dev/null); trust $LASTEXITCODE (0 success, 1 arg-parse error before any spend)"
