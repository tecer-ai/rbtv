# DeepSeek capability manifest — the routing card's data interface for the deepseek package.
# Schema + field meanings + routing-card consumers: ../manifest-schema.md
# Sources: routing-matrix-reference.md §2 (ids + prices live-confirmed 2026-06-09, p6-1 pilot, D-exec-15);
#          DeepSeek API docs: https://api-docs.deepseek.com
#          value-derivation.md (AA-board derived integers; D13 capability-vs-eligibility split)
# This is an API chat worker (stateless HTTP call — no filesystem access, no tool execution loop).
# The four CLI-shaped fields (headless, tool_surface, confinement, swarm_support) are filled
# with the repurposed API-worker values per manifest-schema.md §2a.
#
# D13 CAPABILITY-VS-ELIGIBILITY SPLIT: deepseek-api executes NO code in our dispatch (API chat worker,
# non-executor). The coding integer is the HONEST AA board TBH score — v4-flash 3 (TBH 36–39),
# v4-pro 4 (TBH 42–46) — same scores as the qwen-wrapped twins. Code-ineligibility is expressed
# SEPARATELY via routable_for (no bounded-code / unbounded-code roles). route.py gates code on
# routable_for membership, NEVER on the coding integer (an honest score must not silently re-enable
# an ineligible route). No native web grounding → web-research NOT in routable_for.
#
# The exact invocation shape is in ./manual.md (pointed to by invocation_pointer).

model: deepseek-api
display: "deepseek (API)"
evidence_status: validated   # live-confirmed 2026-06-09 (p6-1, D-exec-15): the text-leaf worker path ran end-to-end on a real paid DeepSeek call. Per-id integration confirmed 2026-06-11: deepseek-v4-flash AND deepseek-v4-pro each ran end-to-end through run.py (exit 0, json_parsed, finish_reason stop) — removes the prior "ids confirmed but not each exercised" caveat. Evidence: 2-areas/rbtv/coding/done-gate-evidence/rbtv/2026-06-11-worker-tier-benchmark.md.

variants:
  - variant: v4-flash   # DeepSeek V4-Flash — best cost/benefit API worker

    # MODEL-ID NOTE: "v4-flash" is the RBTV routing label; the live DeepSeek API model id is
    # `deepseek-v4-flash` (id + price live-confirmed 2026-06-09, p6-1 pilot, D-exec-15), passed to the
    # runner via --model at dispatch time. DEPRECATION: the legacy `deepseek-chat`/`deepseek-reasoner`
    # compatibility aliases are REMOVED 2026-07-24 15:59 UTC — never dispatch them; use the v4 ids.

    # --- capability + cost scores + sizing (routing §2, §8) — scale: schema §0 (integer 1–7) ---
    reasoning: 4                          # AA Intelligence Index 46–47 (DeepSeek V4 Flash Max/High rows); mid reasoner
    coding: 3                             # Terminal-Bench Hard 36–39 (HONEST board score per D13 — mirrors qwen deepseek-flash twin); limited agentic coder; code-ineligibility via routable_for, NOT this score
    cost: 1                               # AA Blended Price $0.06 (DSV4Flash) → bin 1 (cheapest)
    axis_evidence:
      reasoning: { source: "aa-ii(46-47);gpqa(42-45)", confidence: medium }
      coding:    { source: "aa-tbh(36-39)", confidence: medium }   # medium: board rows for bare model, close proxy for API dispatch; D13 honest score
    cost_evidence: { source: "aa-blended($0.06,DSV4Flash)→bin1", confidence: medium }
    context_window: 1000000        # 1M tokens per routing-matrix §2; re-verify against provider docs before pilot
    max_output: 384000             # 384k per routing-matrix §2; re-verify against provider docs before pilot

    # --- role eligibility (routing §2 GATE, independent of capability — D13) ---
    web_access: false              # no native web grounding; cannot satisfy the research leaf
    routable_for: [reasoning, text-synthesis, other]   # D13: bare-API chat worker, no code executor → omits bounded-code + unbounded-code; no native web → omits web-research. route.py gates code on this list, NEVER on the coding integer

    # --- reasoning / effort modes (schema §0a) ---
    reasoning_modes:
      depths: ["off", "on"]         # thinking toggle: off (default) / on (extended thinking); G2 CLOSED — owner accepts as working (p1 re-review c6)
      invocation: "thinking param" # API param that enables thinking; set at dispatch via extra_params
      carrier: "API param"

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true            # stateless HTTP API; multiple concurrent calls are safe under disjoint output folders
    resume_support: none           # stateless API — no session resumption; re-dispatch fresh after a halt

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    # Repurposed API-worker values per manifest-schema.md §2a (API chat worker canonical):
    headless:
      flags: ""                    # no invocation flags — the runner script (run.py) is always non-interactive
      auto_approves_tools: false   # no tool-approval surface on a stateless API call
      prompt_transport: arg        # prompt reaches the runner via --prompt-file argument

    # --- auth pre-flight (routing §1 → key-resolution test, not USER-EXECUTED-ONLY) ---
    auth:
      required: true
      method: api-key              # DEEPSEEK_API_KEY env var; availability = key resolves (not interactive login)
      interactive: false           # key resolution is automated; no human gesture required

    rate_budget_notes: "stateless HTTP; no retry exit-code convention (runner handles HTTP 429/5xx retry); re-verify rate limits against provider docs before pilot"

    # --- tool surface + confinement (routing §2, §4, §8) ---
    # Repurposed API-worker values per manifest-schema.md §2a:
    tool_surface:
      native: []                   # no built-in shell/file/web tools executed by the worker
      mcp: false                   # no MCP server injection
      agent_file: false            # no per-dispatch agent/guidance spec
    confinement:
      workspace_scope: "output-folder only — no filesystem access"   # worker cannot read/write workspace; runner writes only into --output-folder
      tool_restriction: "none — worker cannot execute tools"
      write_enforcement: "runner writes only into --output-folder; path-sanitized against ../ and absolute paths"

    # --- invocation + failures (routing §4, §2) ---
    invocation_pointer: ./manual.md   # rendered dispatch manual for the exact command shape
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant (pinnable into task frontmatter; never re-derived) — resolves to models/deepseek-api/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/deepseek-api/delta.md
    specialty: "cheapest text synthesis and reasoning — the cost-floor API text worker (Thinking Mode, OpenAI-compatible JSON) for partially-bounded text synthesis / mechanical text transforms; code-ineligible (routable_for excludes code roles per D13)"   # within-tier tiebreaker only; boundedness-first stays the master cut
    failure_modes:
      - "legacy deepseek-chat/deepseek-reasoner aliases removed 2026-07-24 15:59 UTC — dispatch deepseek-v4-flash/deepseek-v4-pro (ids + prices live-confirmed 2026-06-09, D-exec-15)"
      - "no session resumption — a halted dispatch must be re-dispatched fresh; no partial-resume path"
      - "API key absent in env + env_file → package unavailable for the dispatch; router degrades, does not halt"
      - "thinking mode behavior (token cost, output format) may differ from routing-matrix estimate — probe before sizing batches"
      - "code-ineligible: routable_for omits bounded-code + unbounded-code (D13) — route.py gates code on routable_for, not on the coding score; dispatching a code leaf here is a routing violation"

    # --- swarm / sub-conducting (routing §4 topology, depth cap) ---
    # Repurposed API-worker values per manifest-schema.md §2a:
    swarm_support:
      subagents: false             # API worker cannot spawn sub-workers
      nesting: none
      default: disabled

  - variant: v4-pro   # DeepSeek V4-Pro — max reasoning quality API worker

    # MODEL-ID NOTE: same as v4-flash above — "v4-pro" is the RBTV routing label; the live DeepSeek API
    # model id is `deepseek-v4-pro` (id + price live-confirmed 2026-06-09, p6-1 pilot, D-exec-15).

    # --- capability + cost scores + sizing (routing §2, §8) — scale: schema §0 (integer 1–7) ---
    reasoning: 5                          # AA Intelligence Index 50–52 (DeepSeek V4 Pro Max/High); top open-weight tier
    coding: 4                             # Terminal-Bench Hard 42–46 (HONEST board score per D13 — mirrors qwen deepseek-pro twin); bounded agentic coder; code-ineligibility via routable_for, NOT this score
    cost: 1                               # AA Blended Price $0.18 (DSV4Pro) → bin 1 (cheapest)
    axis_evidence:
      reasoning: { source: "aa-ii(50-52);gpqa(46-50)", confidence: high }
      coding:    { source: "aa-tbh(42-46)", confidence: high }   # D13 honest score; same backend as qwen deepseek-pro
    cost_evidence: { source: "aa-blended($0.18,DSV4Pro)→bin1", confidence: high }
    context_window: 1000000        # 1M tokens per routing-matrix §2; re-verify against provider docs before pilot
    max_output: 384000             # 384k per routing-matrix §2; re-verify against provider docs before pilot

    # --- role eligibility (routing §2 GATE, independent of capability — D13) ---
    web_access: false              # no native web grounding
    routable_for: [reasoning, text-synthesis, other]   # D13: same as v4-flash — code-ineligible, no native web

    # --- reasoning / effort modes (schema §0a) ---
    reasoning_modes:
      depths: ["off", "on"]         # thinking toggle; G2 CLOSED — owner accepts as working (p1 re-review c6)
      invocation: "thinking param"
      carrier: "API param"

    # --- parallelism + resume (routing §8, §4) ---
    parallel_safe: true            # stateless HTTP API; concurrent calls safe under disjoint output folders
    resume_support: none           # stateless API — re-dispatch fresh after halt

    # --- non-interactive run (routing §4 → dispatch-wrapper) ---
    # Repurposed API-worker values per manifest-schema.md §2a (API chat worker canonical):
    headless:
      flags: ""                    # runner always non-interactive
      auto_approves_tools: false   # no tool-approval surface
      prompt_transport: arg        # prompt via --prompt-file argument

    # --- auth pre-flight ---
    auth:
      required: true
      method: api-key              # same DEEPSEEK_API_KEY; key-resolution test, not interactive login
      interactive: false

    rate_budget_notes: "same HTTP retry semantics as v4-flash; higher per-token cost — apply only where top reasoning tier is required; re-verify rate limits against provider docs before pilot"

    # --- tool surface + confinement ---
    # Repurposed API-worker values per manifest-schema.md §2a:
    tool_surface:
      native: []
      mcp: false
      agent_file: false
    confinement:
      workspace_scope: "output-folder only — no filesystem access"
      tool_restriction: "none — worker cannot execute tools"
      write_enforcement: "runner writes only into --output-folder; path-sanitized against ../ and absolute paths"

    # --- invocation + failures ---
    invocation_pointer: ./manual.md
    manual_path: ./manual.md          # canonical planning-emittable manual-path constant — resolves to models/deepseek-api/manual.md
    delta_path: ./delta.md            # canonical render-source delta constant — resolves to models/deepseek-api/delta.md
    specialty: "cheapest top-reasoning-tier text synthesis — max-reasoning DeepSeek (Thinking Mode) at lowest absolute cost for reasoning/text synthesis; code-ineligible (routable_for excludes code roles per D13)"   # within-tier tiebreaker only
    failure_modes:
      - "legacy deepseek-chat/deepseek-reasoner aliases removed 2026-07-24 15:59 UTC — dispatch deepseek-v4-flash/deepseek-v4-pro (ids + prices live-confirmed 2026-06-09, D-exec-15)"
      - "no session resumption — re-dispatch fresh after halt"
      - "API key absent → package unavailable; router degrades"
      - "top reasoning tier carries higher token cost — confirm budget before batching"
      - "code-ineligible: routable_for omits bounded-code + unbounded-code (D13) — route.py gates code on routable_for, not on the coding score; dispatching a code leaf here is a routing violation"

    # --- swarm / sub-conducting ---
    # Repurposed API-worker values per manifest-schema.md §2a:
    swarm_support:
      subagents: false
      nesting: none
      default: disabled
