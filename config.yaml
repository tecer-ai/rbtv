# Module: rbtv (Robotville)
# Description: Documentation, git workflow, and build components for Robotville

# Project settings
project_name: "RBTV"
user_name: "User"
user_skill_level: intermediate

# Output paths (relative to project root)
default_output_folder: "{project-root}/RBTV/docs/to_dos/"
compound_output_folder: "{project-root}/RBTV/docs/to_dos/"
handoff_output_folder: "{project-root}/RBTV/.cursor/handoff/"

# Product mode output paths (uses bmm workflows, outputs to RBTV)
planning_artifacts: "{project-root}/RBTV/docs/planning"
product_knowledge: "{project-root}/RBTV/docs"
output_folder: "{project-root}/RBTV/docs/planning"

# Build system paths
build_output_folder: "{project-root}/_bmad/rbtv/workflows"
knowledge_folder: "{project-root}/_bmad/rbtv/workflows/build/data"
templates_folder: "{project-root}/_bmad/rbtv/workflows/build/templates"

# Git workflow settings
default_size: 1000
default_push: false

# Behavior settings
communication_language: English
document_output_language: English
