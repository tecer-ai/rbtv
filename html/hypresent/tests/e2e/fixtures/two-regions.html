<!doctype html><html><head><meta charset="utf-8"><style>
  body { margin: 0; font-family: sans-serif; }
  .slide { padding: 60px; width: 1200px; box-sizing: border-box; }
  .slide--one { background: #e0e7ff; }
  .slide--two { background: #dcfce7; }
  .slide h1 { margin: 0 0 16px; }
</style></head><body>
  <section class="slide slide--one" id="region-one">
    <h1>Region One</h1>
    <p>First top-level slide region.</p>
  </section>
  <section class="slide slide--two" id="region-two">
    <h1>Region Two</h1>
    <p>Second top-level slide region.</p>
  </section>
</body></html>
