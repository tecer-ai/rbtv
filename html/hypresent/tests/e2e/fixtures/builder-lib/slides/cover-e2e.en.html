<!-- provenance: fixture (2026-06-06) -->
<section class="slide slide--cover">
  <!-- CLIENT_LOGO_SRC: path to the counterparty's logo. -->
  <!-- CLIENT_NAME: the counterparty's display name. -->
  <img src="{{CLIENT_LOGO_SRC}}" alt="{{CLIENT_NAME}}" class="cover-client" onerror="this.style.display='none'">
  <!-- COVER_TITLE: deck headline. -->
  <div class="cover-title">{{COVER_TITLE}}</div>
  <!-- COVER_SUBTITLE: one sentence positioning. -->
  <div class="cover-subtitle">{{COVER_SUBTITLE}}</div>
  <!-- COVER_DATE: month and year. -->
  <div class="cover-date">{{COVER_DATE}}</div>
</section>
