# Document Style Configuration
# Generated by rbtv-docx-generation config creation mode
# All color hex values: with or without leading '#' as noted per field.

font:
  family: ""          # Primary font for all body and heading text (e.g., "Outfit")
  monospace: ""       # Font for code blocks and inline code (e.g., "Space Mono")
  sizes:
    body: 10          # Regular paragraph text, pt
    h1: 16            # Top-level heading, pt — rendered centered and bold
    h2: 13            # Second-level heading, pt — rendered with bottom border
    h3: 11            # Third-level heading, pt
    small: 8          # Italic-only lines (e.g., confidentiality notices), pt
  line_spacing: 1.15  # Line spacing multiplier for Normal style

colors:
  primary: ""         # Hex WITH '#' — used for footer page numbers and header fallback text (e.g., "#1B2B4B")
  heading: ""         # Hex WITH '#' — used for all heading text and header cell text (e.g., "#1B2B4B")
  table:
    header_bg: ""     # Hex WITHOUT '#' — table header row background fill (e.g., "E8EDF5")
    border: ""        # Hex WITHOUT '#' — table border color and H2 bottom border (e.g., "8DA0C0")
    alt_row: ""       # Hex WITHOUT '#' — alternating data row background fill (e.g., "F5F7FA")

logo:
  path: ""            # Path relative to workspace root (e.g., "brand/assets/logo/logo-navy.png")
  width_cm: 3         # Logo width in the header, cm
  position: "header-right"   # Currently only "header-right" is supported
  fallback_text: ""   # Text wordmark rendered if the logo file is not found (e.g., "ACME")

page:
  size: "letter"      # "letter" (8.5×11 in) or "a4"
  margins:            # Page margins in cm — applied to all sections
    top: 2.5
    bottom: 2.5
    left: 2.5
    right: 2.5

# Signature block detection
# Tables matching these rules are rendered as signature blocks instead of data tables.
signature:
  enabled: true
  header_keywords:    # Case-insensitive. A table header cell matching any of these triggers signature rendering.
    - "assinatura"
    - "signature"
  date_label: "Data"  # Label prepended to the date blank line in each signature block (e.g., "Data: ____/____/________")
