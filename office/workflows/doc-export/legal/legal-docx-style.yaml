font:
  family: "Calibri"
  monospace: "Courier New"
  sizes:
    body: 11
    h1: 14
    h2: 12
    h3: 11
    small: 9
  line_spacing: 1.5

colors:
  primary: "#000000"
  heading: "#000000"
  table:
    header_bg: "D9D9D9"
    border: "000000"
    alt_row: "F2F2F2"

logo:
  path: ""
  width_cm: 0
  position: "header-right"
  fallback_text: ""

page:
  size: "a4"
  margins:
    top: 2.5
    bottom: 2.5
    left: 3.0
    right: 2.0

signature:
  enabled: true
  header_keywords:
    - "assinatura"
    - "signature"
  date_label: "Data"
