# RBTV Install Defaults
# Read by install.py at install time. Baked values are written to rbtv.yaml in the target.

rbtv:
  version: "7.0.0"  # Bumped for standalone release
  name: "rbtv"

# Modules available. Core is always installed.
modules:
  available:
    - core
    - innovation
    - work-productivity
    - writing
  always_installed:
    - core

# Language default
defaults:
  language: "en"
