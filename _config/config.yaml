# RBTV Module Configuration
# Generated by RBTV installer
# Version: 1.0.0
# Date: 2026-02-05

# BMAD Compatibility
# bmad_target_version: the exact BMAD version RBTV was built and tested against
# bmad_min_version: the oldest BMAD version expected to work (best-effort, no guarantee)
bmad_target_version: "6.0.4"
bmad_min_version: "6.0.0"

# Path Aliases
# Resolved per context by installer. Use these instead of {project-root}/_bmad/core/ etc.
# to eliminate multi-hop path resolution for agents (PRD 5).
# bmad_output: updated by installer from BMAD's core/config.yaml output_folder value
paths:
  bmad_core: "{project-root}/_bmad/core"
  bmad_bmm: "{project-root}/_bmad/bmm"
  bmad_rbtv: "{project-root}/_bmad/rbtv"
  bmad_output: "{project-root}/projects"

# Core Configuration Values (inherited from core/config.yaml)
# user_name, communication_language, document_output_language are read from core
