# Configuration Templates

Use these templates to create BMAD configuration files.

---

## Module config.yaml Template

```yaml
# Module: {module-name}
# Description: {what this module does}

# User settings (inherited from core/config.yaml)
# user_name: {inherited}
# communication_language: {inherited}
# document_output_language: {inherited}

# Output paths (override if module needs different locations)
# output_folder: "{bmad_output}"  # inherited from core/config.yaml
# planning_artifacts: "{bmad_output}/planning-artifacts"  # optional override
# implementation_artifacts: "{bmad_output}/implementation-artifacts"  # optional override

# Module-specific settings
# {key}: {value}
```

---

## Global manifest.yaml Template

```yaml
# System Installation Manifest
installation:
  version: "{version}"
  install_date: "{date}"
  ide_support:
    - claude-code
    - cursor

modules:
  core:
    version: "{version}"
    source: built-in
  {module-name}:
    version: "{version}"
    source: external
    npm_package: "{package-name}"
    install_date: "{date}"
```

---

## Field Instructions

### Module config.yaml
- **user_name**: Displayed in greetings, embedded in output documents
- **communication_language**: What language the agent speaks
- **output_folder**: Root output directory (all paths derive from this)
- **planning_artifacts**: Where planning documents go
- **implementation_artifacts**: Where implementation documents go

### Global manifest.yaml
- **version**: System version number
- **ide_support**: List of supported IDEs
- **modules**: Installed modules with metadata

---

## Path Rules

1. **Always use {project-root}** — Never hardcode absolute paths
2. **Keep paths flat** — Avoid deep nesting
3. **Use config variables** — Reference paths via `{planning_artifacts}`, etc.

---

## Size Guidelines

| File | Target Lines | Max |
|------|-------------|-----|
| Module config.yaml | 8-15 | 20 |
| Global manifest.yaml | 15-25 | 40 |

---

## Common Mistakes

1. **Hardcoded paths** — Always use `{project-root}`

2. **Deeply nested config** — Keep it flat, key-value pairs

3. **Missing output paths** — Agents and workflows need to know where to write
